name: Auto-Generate PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  auto-populate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and context
        id: pr-context
        run: |
          # Fetch base branch
          git fetch origin ${{ github.base_ref }}

          # Get diff stats
          DIFF_STATS=$(git diff --stat origin/${{ github.base_ref }}...HEAD)

          # Get full diff (limited to prevent token overflow)
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD | head -c 15000)

          # Get changed files with their status
          FILES=$(git diff --name-status origin/${{ github.base_ref }}...HEAD)

          # Get commit messages
          COMMITS=$(git log --oneline origin/${{ github.base_ref }}...HEAD)

          # Save to outputs
          echo "diff_stats<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Save diff to file
          echo "$DIFF" > pr_diff.txt

      - name: Generate PR description sections
        id: generate-sections
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const currentBody = context.payload.pull_request.body || '';

            // Skip if already has our markers (workflow or Kiro-generated)
            if (currentBody.includes('<!-- PR-TEMPLATE-APPLIED -->') ||
                currentBody.includes('<!-- KIRO-GENERATED -->')) {
              console.log('PR already has template sections');
              core.setOutput('skip', 'true');
              return;
            }

            const diff = fs.readFileSync('pr_diff.txt', 'utf8');
            const prTitle = context.payload.pull_request.title;
            const changedFiles = process.env.CHANGED_FILES;
            const commits = process.env.COMMITS;
            const diffStats = process.env.DIFF_STATS;

            // Analyze the changes
            const fileList = changedFiles.split('\n').filter(line => line.trim());
            const fileCount = fileList.length;
            const fileTypes = fileList
              .map(line => {
                const match = line.match(/\.(ts|js|py|java|go|rb|cpp|c|h|yml|yaml|json|md)$/);
                return match ? match[1] : null;
              })
              .filter(Boolean);

            const uniqueFileTypes = [...new Set(fileTypes)];

            // Generate commit message
            const commitMessage = prTitle.length > 50
              ? prTitle.substring(0, 47) + '...'
              : prTitle;

            // Generate motivation based on file changes
            let motivation = `### Changes Overview\n\n`;
            motivation += `This PR modifies ${fileCount} file(s) across ${uniqueFileTypes.join(', ')} files.\n\n`;
            motivation += `**Changed Files:**\n`;
            changedFiles.split('\n').slice(0, 10).forEach(file => {
              const [status, path] = file.split('\t');
              const statusText = status === 'A' ? 'Added' : status === 'M' ? 'Modified' : status === 'D' ? 'Deleted' : 'Changed';
              motivation += `- [${statusText}] \`${path}\`\n`;
            });

            if (fileCount > 10) {
              motivation += `\n_...and ${fileCount - 10} more files_\n`;
            }

            motivation += `\n**Commits in this PR:**\n`;
            commits.split('\n').forEach(commit => {
              motivation += `- ${commit}\n`;
            });

            // Generate testing section
            let testing = `### Testing Approach\n\n`;
            testing += `**Automated Tests:**\n`;
            testing += `- [ ] Unit tests pass\n`;
            testing += `- [ ] Integration tests pass\n`;
            testing += `- [ ] Linting passes\n`;
            testing += `- [ ] Type checking passes\n\n`;

            testing += `**Manual Testing:**\n`;
            testing += `1. Pull this branch: \`git checkout ${context.payload.pull_request.head.ref}\`\n`;
            testing += `2. Install dependencies\n`;
            testing += `3. Run the application\n`;
            testing += `4. Verify the changes work as expected\n\n`;

            testing += `**Test Coverage:**\n`;
            testing += `- Current coverage: _[To be updated by CI]_\n`;
            testing += `- New tests added: _[Please specify]_\n\n`;

            testing += `**Diff Stats:**\n\`\`\`\n${diffStats}\n\`\`\`\n`;

            core.setOutput('commit_message', commitMessage);
            core.setOutput('motivation', motivation);
            core.setOutput('testing', testing);
            core.setOutput('skip', 'false');
        env:
          CHANGED_FILES: ${{ steps.pr-context.outputs.changed_files }}
          COMMITS: ${{ steps.pr-context.outputs.commits }}
          DIFF_STATS: ${{ steps.pr-context.outputs.diff_stats }}

      - name: Update PR with generated sections
        if: steps.generate-sections.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const currentBody = context.payload.pull_request.body || '';
            const commitMessage = process.env.COMMIT_MESSAGE;
            const motivation = process.env.MOTIVATION;
            const testing = process.env.TESTING;

            // Build new description
            const autoGeneratedSection = `
<!-- PR-TEMPLATE-APPLIED -->

---

## Suggested Commit Message

\`\`\`
${commitMessage}
\`\`\`

---

## Motivation

${motivation}

---

## Testing

${testing}

---

## Review Checklist

- [ ] Code follows team conventions
- [ ] Self-review completed
- [ ] Complex logic documented
- [ ] Breaking changes documented
- [ ] Security implications considered
- [ ] Performance impact assessed
`;

            const newBody = currentBody + '\n\n' + autoGeneratedSection;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: newBody
            });

            console.log('PR description updated with template sections');
        env:
          COMMIT_MESSAGE: ${{ steps.generate-sections.outputs.commit_message }}
          MOTIVATION: ${{ steps.generate-sections.outputs.motivation }}
          TESTING: ${{ steps.generate-sections.outputs.testing }}

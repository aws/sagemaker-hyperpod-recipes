name: Pricing Benchmark for New Recipes

on:
  pull_request:
    branches:
      - main
    types: [labeled]
  workflow_dispatch:
    inputs:
      recipes:
        description: 'Comma-separated recipe list (relative to recipes_collection/recipes/)'
        required: true
        type: string
      branch:
        description: 'Branch to use for recipes checkout'
        required: true
        type: string
      instance_type_list:
        description: 'Comma-separated instance types (optional, defaults to all supported)'
        required: false
        type: string
      sequence_lengths:
        description: 'Comma-separated sequence lengths (optional, defaults to auto)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — check capacity but do not start executions'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: pricing-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  AWS_REGION: us-west-2
  STATE_MACHINE_ARN: arn:aws:states:us-west-2:856521071176:stateMachine:RecipeBenchmarkWorkflow
  ASG_NAME: RecipesAutomationRunner

jobs:
  orchestrate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'run-pricing')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      has_work: ${{ steps.build-matrix.outputs.skip == 'false' }}
      execution_matrix: ${{ steps.build-matrix.outputs.execution_matrix }}
      cluster_map: ${{ steps.config.outputs.cluster_map }}
      branch_ref: ${{ inputs.branch || github.head_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.head_ref }}
          fetch-depth: 0

      - name: Install dependencies
        run: pip install pyyaml boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::856521071176:role/RecipesAutomationGitHubWorkflowRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build execution matrix
        id: build-matrix
        run: python3 .github/scripts/recipes_automation/build_execution_matrix.py
        env:
          RECIPES: ${{ inputs.recipes || '' }}
          BRANCH: ${{ inputs.branch || github.head_ref }}
          RUN_ID: gh_${{ github.sha }}
          BASE_BRANCH: ${{ github.base_ref || 'main' }}
          INSTANCE_TYPES: ${{ inputs.instance_type_list || '' }}
          SEQUENCE_LENGTHS: ${{ inputs.sequence_lengths || '' }}

      - name: Fetch cluster map
        id: config
        if: steps.build-matrix.outputs.skip == 'false'
        run: |
          aws s3 cp s3://sagemaker-engines-recipes-autoconfig-artifacts-856521071176/configuration/pipeline_autoconfig.yaml /tmp/pipeline_autoconfig.yaml
          CLUSTER_MAP=$(python3 -c "
          import yaml, json
          with open('/tmp/pipeline_autoconfig.yaml') as f:
              cfg = yaml.safe_load(f)
          print(json.dumps(cfg.get('k8', {}).get('cluster_context_map', {})))
          ")
          echo "cluster_map=$CLUSTER_MAP" >> $GITHUB_OUTPUT

      - name: Scale up runner
        if: steps.build-matrix.outputs.skip == 'false'
        run: |
          CURRENT=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ env.ASG_NAME }}" \
            --query "AutoScalingGroups[0].DesiredCapacity" --output text)
          NEW=$((CURRENT + 1))

          aws autoscaling set-desired-capacity \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --desired-capacity "$NEW"

          echo "⏳ Waiting for new instance to be InService (desired=$NEW)..."
          for i in $(seq 1 60); do
            IN_SERVICE=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "${{ env.ASG_NAME }}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'] | length(@)" \
              --output text)
            if [ "${IN_SERVICE}" -ge "$NEW" ]; then
              echo "✅ Runner instance InService"
              sleep 90  # Wait for runner agent to register
              exit 0
            fi
            sleep 10
          done
          echo "❌ Timed out"
          exit 1

  benchmark:
    needs: orchestrate
    if: needs.orchestrate.outputs.has_work == 'true'
    runs-on: [self-hosted, recipes-automation]
    timeout-minutes: 10080
    outputs:
      exec_names: ${{ steps.start.outputs.exec_names }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.orchestrate.outputs.branch_ref }}
          fetch-depth: 0

      - name: Start pricing benchmarks with capacity checks
        id: start
        run: python3 .github/scripts/recipes_automation/run_pricing.py
        env:
          EXECUTION_MATRIX: ${{ needs.orchestrate.outputs.execution_matrix }}
          STATE_MACHINE_ARN: ${{ env.STATE_MACHINE_ARN }}
          ASSUME_ROLE_ARN: arn:aws:iam::855988369404:role/HyperPodRecipesIntegTestRole
          CLUSTER_MAP: ${{ needs.orchestrate.outputs.cluster_map }}
          BRANCH: ${{ needs.orchestrate.outputs.branch_ref }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          MAX_WAIT: "604800"
          POLL_INTERVAL: "300"

  cleanup:
    needs: [orchestrate, benchmark]
    if: always() && needs.orchestrate.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::856521071176:role/RecipesAutomationGitHubWorkflowRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop running executions
        run: |
          python3 -c "
          import boto3
          sfn = boto3.client('stepfunctions', region_name='us-west-2')
          sm_arn = '${{ env.STATE_MACHINE_ARN }}'
          run_id = 'gh_${{ github.sha }}'[:16]
          paginator = sfn.get_paginator('list_executions')
          for page in paginator.paginate(stateMachineArn=sm_arn, statusFilter='RUNNING'):
              for ex in page['executions']:
                  if run_id in ex['name']:
                      sfn.stop_execution(executionArn=ex['executionArn'], cause='Workflow cancelled')
                      print(f'Stopped: {ex[\"name\"]}')
          "

      - name: Scale down runner
        run: |
          CURRENT=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ env.ASG_NAME }}" \
            --query "AutoScalingGroups[0].DesiredCapacity" --output text)
          NEW=$(( CURRENT > 0 ? CURRENT - 1 : 0 ))
          aws autoscaling set-desired-capacity \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --desired-capacity "$NEW"
          echo "✅ ASG scaled from $CURRENT to $NEW"

name: Tag and JS Release

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Commit hash to compare and tag'
        required: true
        type: string
      recipe_metadata:
        description: 'Custom recipe metadata JSON (optional) - bypasses auto-detection when provided'
        required: false
        type: string
      lambda_name:
        description: 'Custom Lambda function ARN (optional)'
        required: false
        type: string
      exclusions:
        description: 'Space-separated exclusion patterns to override defaults (optional)'
        required: false
        type: string

permissions:
  id-token: write
  contents: write # Required for creating tags

jobs:
  run-after-approval:
    runs-on: ubuntu-latest
    environment: release-production-approval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch full history for validation
          submodules: recursive

      - name: Validate commit hash
        id: validate-commit
        run: |
          # Verify the commit exists
          if ! git rev-parse --verify "${{ inputs.commit_hash }}" >/dev/null 2>&1; then
            echo "Error: Commit hash ${{ inputs.commit_hash }} does not exist in repository"
            exit 1
          fi

          # Get full commit hash
          FULL_COMMIT=$(git rev-parse "${{ inputs.commit_hash }}")
          echo "full_commit=$FULL_COMMIT" >> $GITHUB_OUTPUT
          echo "Validated commit: $FULL_COMMIT"

      - name: Checkout specified commit
        run: |
          git checkout "${{ steps.validate-commit.outputs.full_commit }}"
          git submodule update --init --recursive

      - name: Get latest release tag
        id: get-latest-tag
        run: |
          # Get all release tags matching the pattern release-YYYY-MM-DD-HHMM
          LATEST_TAG=$(git tag -l "release-*" | grep -E "release-[0-9]{4}-[0-9]{2}-[0-9]{2}(-[0-9]{4})?" | sort -V | tail -n 1)

          echo "Latest release tag: $LATEST_TAG"
          echo "has_tag=true" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Generate new release tag
        id: generate-tag
        run: |
          # Generate new tag in format release-YYYY-MM-DD-HHMM
          NEW_TAG="release-$(date +%Y-%m-%d-%H%M)"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated new tag: $NEW_TAG"

          # Check if tag already exists
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            EXISTING_COMMIT=$(git rev-list -n 1 "$NEW_TAG")
            echo "Error: Tag $NEW_TAG already exists (points to commit $EXISTING_COMMIT)"
            echo "Cannot create duplicate release tag. Please wait a minute and try again."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.JS_RECIPE_UPDATE_ROLE }}
          aws-region: us-west-2

      - name: Who am I (sanity)
        run: aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install boto3

      - name: Detect recipe changes
        id: detect-changes
        if: ${{ !inputs.recipe_metadata }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Determine the base reference for comparison
          BASE_REF="${{ steps.get-latest-tag.outputs.latest_tag }}"
          echo "Comparing against latest tag: $BASE_REF"

          # Run comparison script with version checking enabled
          python .github/scripts/compare_launch_jsons.py \
            --release-branch "$BASE_REF" \
            --output-dir /tmp/launch_json_compare \
            --job-types "k8s" \
            --fail-on-changes

          # Read results from JSON file
          RESULTS_FILE="/tmp/launch_json_compare/comparison_results.json"

          # Extract new + changed + removed using jq
          CHANGED_FILES=$(jq -r '(.new + .changed + .removed) | .[]' "$RESULTS_FILE" 2>/dev/null || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No recipe changes detected between $BASE_REF and ${{ steps.validate-commit.outputs.full_commit }}"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Changes detected:"
          echo "$CHANGED_FILES"

      - name: Process recipe changes
        id: process-recipes
        if: steps.detect-changes.outputs.has_changes == 'true' && !inputs.recipe_metadata
        env:
          CHANGED_FILES: ${{ steps.detect-changes.outputs.changed_files }}
          LAUNCH_JSON_DIR: /tmp/launch_json_compare/current
        run: python .github/scripts/process_recipe_metadata.py

      - name: Create release tag
        id: create-tag
        if: steps.detect-changes.outputs.has_changes == 'true' && !inputs.recipe_metadata
        run: |
          NEW_TAG="${{ steps.generate-tag.outputs.new_tag }}"
          COMMIT_HASH="${{ steps.validate-commit.outputs.full_commit }}"

          echo "Creating tag $NEW_TAG at commit $COMMIT_HASH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" "$COMMIT_HASH" -m "Release tag $NEW_TAG created by Tag and JS Release workflow"
          git push origin "$NEW_TAG"
          echo "Successfully created and pushed tag $NEW_TAG"

          # Output the tag for use in metadata
          echo "tag_name=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Inject HyperPod branch (tag name) into metadata
        id: inject-hyperpod-branch
        if: steps.process-recipes.outputs.recipe_metadata
        run: |
          METADATA='${{ steps.process-recipes.outputs.recipe_metadata }}'
          TAG_NAME='${{ steps.create-tag.outputs.tag_name }}'

          # Parse the metadata and add hyperpodBranch with the tag name
          UPDATED_METADATA=$(echo "$METADATA" | jq --arg branch "$TAG_NAME" '. + {hyperpodBranch: $branch}')

          # Set the updated metadata as output
          echo "updated_metadata<<EOF" >> $GITHUB_OUTPUT
          echo "$UPDATED_METADATA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Added hyperpodBranch: $TAG_NAME"

      - name: Configure TCP keepalive
        if: steps.detect-changes.outputs.has_changes == 'true' || inputs.recipe_metadata
        run: |
          sudo sysctl -w net.ipv4.tcp_keepalive_time=30
          sudo sysctl -w net.ipv4.tcp_keepalive_intvl=30
          sudo sysctl -w net.ipv4.tcp_keepalive_probes=5

      - name: Trigger JumpStart Lambda and Update CloudWatch
        if: steps.detect-changes.outputs.has_changes == 'true' || inputs.recipe_metadata
        env:
          RECIPE_METADATA: ${{ inputs.recipe_metadata || steps.inject-hyperpod-branch.outputs.updated_metadata }}
          JS_LAMBDA_NAME: ${{ inputs.lambda_name || secrets.JS_LAMBDA_ARN }}
          EXCLUSIONS: ${{ inputs.exclusions || '' }}
          AWS_REGION: us-west-2
        run: |
          echo "Processed metadata: $RECIPE_METADATA"
          EXCLUSION_ARG=""
          if [ -n "$EXCLUSIONS" ]; then
            EXCLUSION_ARG="--exclusions $EXCLUSIONS"
          fi
          python .github/scripts/trigger_lambda.py \
            --metadata "$RECIPE_METADATA" \
            --lambda-name "$JS_LAMBDA_NAME" \
            $EXCLUSION_ARG

      - name: Summary
        if: always()
        env:
          RECIPE_METADATA: ${{ inputs.recipe_metadata || steps.inject-hyperpod-branch.outputs.updated_metadata }}
        run: |
          echo "## Release Processing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit Hash**: ${{ steps.validate-commit.outputs.full_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Release Tag**: ${{ steps.get-latest-tag.outputs.latest_tag || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Release Tag**: ${{ steps.create-tag.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom Recipe Metadata**: ${{ inputs.recipe_metadata && 'Yes (bypassed auto-detection)' || 'No' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **HyperPod Branch Injected**: ${{ steps.inject-hyperpod-branch.outputs.updated_metadata && 'Yes (tag name added)' || 'No (manual metadata or no changes)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.detect-changes.outputs.has_changes || 'N/A (custom metadata provided)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Complete Metadata Sent to Lambda" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RECIPE_METADATA" | jq . 2>/dev/null || echo "$RECIPE_METADATA" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

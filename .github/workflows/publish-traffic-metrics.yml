name: GitHub Traffic Metrics

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC (previous day's data just completed)
  workflow_dispatch:      # Allows manual triggering

permissions:
   id-token: write
   contents: read

jobs:
  record-traffic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install requests boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.RUNNER_ROLE_ARN }}
          aws-region: us-west-2

      - name: Record metrics
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_PUBLIC_REPO_READ_TRAFFIC }}
        run: python scripts/record_metrics.py

name: Recipe Version Check

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check-recipe-versions:
    runs-on: ubuntu-latest
    name: Validate Recipe Version Updates

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history for git diff
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate recipe versions
        id: version-check
        run: |
          echo "Comparing current branch against "release" branch"

          python .github/scripts/compare_launch_jsons.py \
            --release-branch release \
            --fail-on-changes
        env:
          PYTHONPATH: ${{ github.workspace }}

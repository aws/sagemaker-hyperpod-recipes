name: Eval Validation

# ── Workflow Behavior Matrix ──
#
# Scenario                                        | PR Comment                      | Ticket          | SNS       | Workflow
# ------------------------------------------------|---------------------------------|-----------------|-----------|----------
# All mappings present                            | ✅ Success                      | ❌ Skip          | ❌ Skip    | ✅ Pass
# Unmapped model (no JS ID)                       | ❌ "Missing JumpStart Model ID" | ❌ Skip          | ❌ Skip    | ❌ Fail
# Missing instance mapping + artifacts not found  | ⚠️ "Missing Training Artifacts" | ❌ Skip          | ❌ Skip    | ❌ Fail
# Missing instance mapping + all artifacts found  | ⚠️ With ticket link             | ✅ Create/Update | ✅ Send    | ❌ Fail

on:
  pull_request:
    branches:
      - main
    paths:
      - 'recipes_collection/recipes/**/*.yaml'
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-west-2
  # Default severity for recipe validation tickets (SEV-3)
  DEFAULT_SEVERITY: SEV_3
  # CTI (Category/Type/Item) for Eval team - routes to configured resolver group
  EVAL_CTI: "AWS/SageMaker/Supay - Evaluation"

jobs:
  eval-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR information
        id: get-pr-info
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_title=${PR_TITLE}" >> $GITHUB_OUTPUT
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "pr_author=${PR_AUTHOR}" >> $GITHUB_OUTPUT
          echo "pr_head_sha=${PR_HEAD_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Detect changed recipe files
        id: detect-changes
        run: |
          git fetch origin ${{ github.base_ref || 'main' }}:base_branch
          CHANGED_FILES=$(git diff base_branch...HEAD --name-only -- 'recipes_collection/recipes/**/*.yaml' | sort || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Check eval coverage for changed recipes
        id: check-coverage
        env:
          CHANGED_FILES: ${{ steps.detect-changes.outputs.changed_files }}
        run: |
          python .github/scripts/check_eval_coverage.py \
            --changed-files "$CHANGED_FILES" \
            --recipes-dir recipes_collection/recipes/fine-tuning \
            --model-id-map launcher/recipe_templatization/jumpstart_model-id_map.json \
            --eval-params launcher/recipe_templatization/evaluation/evaluation_regional_parameters.json

      # ── All mappings present: post success comment and exit ──
      - name: Post success PR comment
        if: steps.check-coverage.outputs.has_missing != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
        run: |
          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- eval-validation-workflow-comment -->
          ## ✅ Eval Validation Complete

          All recipe(s) checked in this PR have eval instance mapping. No action required.

          | Check | Status |
          |-------|--------|
          | Recipe change detection | ✅ Complete |
          | Instance mapping check | ✅ All present |
          | Tracking ticket | Not needed |
          | SNS notification | Not needed |

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Eval Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md

      # ── Unmapped models: post error comment and fail (no ticket/SNS) ──
      - name: Post unmapped-models PR comment
        if: steps.check-coverage.outputs.has_unmapped_models == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
        run: |
          # Build table of unmapped models
          UNMAPPED_ROWS=$(python3 -c "
          import json, os
          missing = json.loads(os.environ['MISSING_RECIPES'])
          for entry in missing:
              if entry.get('js_model_id') is None:
                  names = ', '.join(f'\`{n}\`' for n in entry['run_names'])
                  paths = ', '.join(f'\`{p}\`' for p in entry['recipe_paths'])
                  print(f'| {names} | {paths} |')
          ")

          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- eval-validation-workflow-comment -->
          ## ❌ Eval Validation Failed — Missing JumpStart Model ID

          One or more recipes have \`run.name\` values that are **not found in \`jumpstart_model-id_map.json\`**.

          This must be fixed before the PR can merge. Ticket creation and eval automation were **skipped**.

          ### Unmapped Models

          | run.name | Recipe Path(s) |
          |----------|---------------|
          ${UNMAPPED_ROWS}

          ### How to Fix

          Add the missing \`run.name\` → JumpStart model ID mapping in:
          \`launcher/recipe_templatization/jumpstart_model-id_map.json\`

          Then re-run this workflow.

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Eval Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md

          # Fail early — all subsequent steps are skipped on failure,
          # so we don't need to guard them against has_unmapped_models.
          echo "❌ Unmapped models found. Fix jumpstart_model-id_map.json and re-run."
          exit 1

      # ── From here, has_unmapped_models is guaranteed false (early-fail above). ──
      # ── Steps only need to check has_missing == 'true' to proceed.            ──

      - name: Configure AWS credentials
        if: steps.check-coverage.outputs.has_missing == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PARTNER_TEAM_RECIPE_VALIDATION_GITHUB_WORKFLOW_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        if: steps.check-coverage.outputs.has_missing == 'true'
        run: aws sts get-caller-identity

      - name: Install AWS dependencies
        if: steps.check-coverage.outputs.has_missing == 'true'
        run: |
          # awscrt and botocore[crt] are required for SigV4A signing (global endpoint)
          pip install boto3 requests awscrt botocore[crt]

      - name: Resolve model artifact S3 URIs
        if: steps.check-coverage.outputs.has_missing == 'true'
        id: resolve-artifacts
        env:
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
        run: |
          python .github/scripts/resolve_model_artifacts.py \
            --missing-recipes "$MISSING_RECIPES" \
            --bucket hyperpod-recipes-validation-artifacts \
            --prefix validation_results/

      # ── Artifacts not all found: post warning comment (no ticket/SNS) ──
      - name: Post missing-artifacts PR comment
        if: steps.resolve-artifacts.outputs.has_unresolved == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
        run: |
          # Build artifact status table
          ARTIFACT_ROWS=$(python3 -c "
          import json, os

          missing = json.loads(os.environ['MISSING_RECIPES'])
          artifact_data = json.loads(os.environ.get('ARTIFACT_DATA', '[]'))

          lookup = {}
          for ad in artifact_data:
              mid = ad.get('model-id', '')
              uri = ad.get('s3Uri', '')
              if mid:
                  lookup[mid] = uri

          for entry in missing:
              names = ', '.join(f'\`{n}\`' for n in entry['run_names'])
              js_id = entry.get('js_model_id') or 'NOT MAPPED'
              uri = lookup.get(js_id, '')
              status = '✅ Found' if uri else '❌ Not found'
              print(f'| {names} | \`{js_id}\` | {status} |')
          ")

          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- eval-validation-workflow-comment -->
          ## ⚠️ Eval Validation — Missing Training Artifacts

          **${MISSING_COUNT} model(s)** are missing eval instance mapping, and trained artifacts were **not found in S3** for some or all models.

          Ticket creation and eval automation were **skipped** because artifacts must be available first.

          ### Model Artifact Status

          | Model | JumpStart ID | Training Artifact |
          |-------|-------------|-------------------|
          ${ARTIFACT_ROWS}

          ### What Needs to Happen

          1. Ensure training validation jobs have completed and artifacts are uploaded to S3
          2. Add eval instance mapping in \`launcher/recipe_templatization/evaluation/evaluation_regional_parameters.json\`
          3. Re-run this workflow — once all artifacts are found, a tracking ticket will be created and eval automation triggered

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Eval Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md

          # Fail early — skips ticket creation and SNS notification.
          echo "❌ Training artifacts not found. Upload artifacts and re-run."
          exit 1

      # ── From here, has_unresolved is guaranteed false (early-fail above). ──

      - name: Build ticket description
        if: steps.check-coverage.outputs.has_missing == 'true'
        id: build-description
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_URL: ${{ steps.get-pr-info.outputs.pr_url }}
          PR_AUTHOR: ${{ steps.get-pr-info.outputs.pr_author }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
        run: |
          python3 << 'PYEOF'
          import json
          import os

          pr_number = os.environ["PR_NUMBER"]
          pr_url = os.environ["PR_URL"]
          pr_author = os.environ["PR_AUTHOR"]
          pr_head_sha = os.environ["PR_HEAD_SHA"]
          missing_count = os.environ["MISSING_COUNT"]
          missing_recipes = json.loads(os.environ["MISSING_RECIPES"])

          # Parse artifact data for display
          artifact_data = []
          try:
              artifact_data = json.loads(os.environ.get("ARTIFACT_DATA", "[]"))
          except (json.JSONDecodeError, TypeError):
              pass

          # Build a lookup of model-id -> s3Uri for display
          artifact_lookup = {}
          for ad in artifact_data:
              mid = ad.get("model-id", "")
              uri = ad.get("s3Uri", "")
              if mid:
                  artifact_lookup[mid] = uri

          lines = []
          lines.append("## Eval Instance Mapping Required\n")
          lines.append(f"**{missing_count} model(s)** are missing eval instance mapping data.\n")
          lines.append("### Pull Request Context\n")
          lines.append(f"- **PR:** [#{pr_number}]({pr_url})")
          lines.append(f"- **Author:** {pr_author}")
          lines.append(f"- **HEAD SHA:** `{pr_head_sha}`\n")

          lines.append("### Models Missing Eval Data\n")

          for entry in missing_recipes:
              run_names = entry["run_names"]
              display_name = ", ".join(f"`{n}`" for n in run_names)
              js_model_id = entry.get("js_model_id") or "NOT MAPPED"
              reason = entry["reason"]
              recipe_paths = entry["recipe_paths"]

              # Look up resolved artifact
              s3_uri = artifact_lookup.get(js_model_id, "")

              lines.append(f"#### {display_name}")
              lines.append(f"- **JumpStart Model ID:** `{js_model_id}`")
              lines.append(f"- **Reason:** {reason}")
              if s3_uri:
                  lines.append(f"- **Training Artifact:** `{s3_uri}`")
              else:
                  lines.append(f"- **Training Artifact:** ⚠️ Not found in S3")
              lines.append(f"- **Affected recipes ({len(recipe_paths)}):**")
              for rp in recipe_paths:
                  lines.append(f"  - `{rp}`")
              lines.append("")

          lines.append("### Required Actions\n")
          lines.append("1. Run eval validation tests if needed")
          lines.append("2. Add eval instance mapping for the above models in:")
          lines.append("   `launcher/recipe_templatization/evaluation/evaluation_regional_parameters.json`")
          lines.append("3. Resolve this ticket once the mappings are added\n")
          lines.append("---")
          lines.append("*This ticket was automatically created by the Eval Validation GitHub Workflow*")

          description = "\n".join(lines)

          # Write to GITHUB_OUTPUT using heredoc
          gh_output = os.environ.get("GITHUB_OUTPUT", "")
          if gh_output:
              with open(gh_output, "a") as f:
                  f.write(f"description<<EOFMARKER\n{description}\nEOFMARKER\n")

          print(description)
          PYEOF

      - name: Create or update ticket
        if: steps.check-coverage.outputs.has_missing == 'true'
        id: create-ticket
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_URL: ${{ steps.get-pr-info.outputs.pr_url }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          TICKET_DESCRIPTION: ${{ steps.build-description.outputs.description }}
        run: |
          TITLE="[Eval Validation] ${MISSING_COUNT} Model(s) Missing Eval Instance Mapping"

          UPDATE_COMMENT="Updated from PR #${PR_NUMBER}.

          **Commit:** \`${PR_HEAD_SHA}\`
          **PR URL:** ${PR_URL}
          **Missing models:** ${MISSING_COUNT}"

          python .github/scripts/tickety.py \
            --title "$TITLE" \
            --description "$TICKET_DESCRIPTION" \
            --severity "$DEFAULT_SEVERITY" \
            --cti "$EVAL_CTI" \
            --deduplicator "eval-validation-pr-${PR_NUMBER}" \
            --update-comment "$UPDATE_COMMENT"

      - name: Trigger Eval validation via SNS
        if: steps.create-ticket.outputs.action == 'CREATED'
        id: trigger-sns
        continue-on-error: true
        env:
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
          TICKET_ID: ${{ steps.create-ticket.outputs.ticket_id }}
          PR_URL: ${{ steps.get-pr-info.outputs.pr_url }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          SNS_TOPIC_ARN: "arn:aws:sns:us-west-2:855988369404:eval-validation-workflow.fifo"
        run: |
          echo "=== Notifying Eval Team via SNS ==="

          # Build the contract-format SNS message from resolved artifact data.
          # Each entry in artifact_data contains: model-id, recipe_path, s3Uri
          # We emit one SNS event per recipe (not per model-id) so each recipe
          # can be tracked individually by the eval pipeline.
          # Each event also includes a 'ticket' field with the tracking ticket URL.
          # The ticket ID is used as both the FIFO message group ID (so messages
          # for different PRs/tickets can be delivered in parallel) and the
          # deduplication ID (preventing duplicate publishes within a 5-min window).
          MESSAGE=$(python3 -c "
          import json, os
          from datetime import datetime, timezone

          artifact_data = json.loads(os.environ['ARTIFACT_DATA'])
          pr_number = os.environ['PR_NUMBER']
          ticket_id = os.environ['TICKET_ID']
          event_time = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%S.000Z')

          events = []
          for entry in artifact_data:
              events.append({
                  'eventOrigin': f'hp-engine-github-validation-workflow-pr-{pr_number}',
                  'eventTime': event_time,
                  'eventName': 'Validation',
                  'model-id': entry['model-id'],
                  'event': 'newRecipe',
                  'eventType': 'major',
                  's3Uri': entry['s3Uri'],
                  'recipePath': entry.get('recipe_path', ''),
                  'ticket': f'https://t.corp.amazon.com/{ticket_id}',
              })
          print(json.dumps(events))
          ")

          echo "SNS Message:"
          echo "$MESSAGE" | jq .

          MESSAGE_GROUP_ID="${TICKET_ID}"
          MESSAGE_DEDUP_ID="${TICKET_ID}"

          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --message "$MESSAGE" \
            --message-group-id "$MESSAGE_GROUP_ID" \
            --message-deduplication-id "$MESSAGE_DEDUP_ID"

          echo "SNS notification sent successfully"

      - name: Post detailed PR comment
        if: steps.create-ticket.outputs.ticket_id != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          TICKET_ID: ${{ steps.create-ticket.outputs.ticket_id }}
          ACTION: ${{ steps.create-ticket.outputs.action }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
          SNS_OUTCOME: ${{ steps.trigger-sns.outcome }}
        run: |
          # Determine ticket action display
          case "$ACTION" in
            CREATED) ACTION_DISPLAY="🆕 Created" ;;
            UPDATED) ACTION_DISPLAY="📝 Updated" ;;
            *)       ACTION_DISPLAY="ℹ️ $ACTION" ;;
          esac

          # Determine SNS status based on actual outcome
          if [ "$ACTION" = "CREATED" ]; then
            if [ "$SNS_OUTCOME" = "success" ]; then
              SNS_STATUS="✅ Sent"
            else
              SNS_STATUS="❌ Failed (see workflow logs)"
            fi
          else
            SNS_STATUS="⏭️ Skipped (ticket already open)"
          fi

          # Build the model status table rows from MISSING_RECIPES JSON
          MODEL_ROWS=$(python3 -c "
          import json, os
          missing = json.loads(os.environ['MISSING_RECIPES'])
          for entry in missing:
              names = ', '.join(f'\`{n}\`' for n in entry['run_names'])
              js_id = entry.get('js_model_id') or 'NOT MAPPED'
              reason = entry['reason']
              if 'jumpstart_model-id_map' in reason:
                  status = '❌ Not in model-id map'
              else:
                  status = '❌ Missing instance mapping'
              print(f'| {names} | \`{js_id}\` | {status} |')
          ")

          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- eval-validation-workflow-comment -->
          ## ⚠️ Eval Validation — Instance Mapping Required

          **${MISSING_COUNT} model(s)** in this PR are missing eval instance mapping data.

          ### Models Requiring Action

          | Model | JumpStart ID | Instance Mapping |
          |-------|-------------|-----------------|
          ${MODEL_ROWS}

          ### Tracking

          | Item | Status |
          |------|--------|
          | Recipe change detection | ✅ Complete |
          | Instance mapping check | ⚠️ ${MISSING_COUNT} missing |
          | Tracking ticket | ${ACTION_DISPLAY} — [${TICKET_ID}](https://t.corp.amazon.com/${TICKET_ID}) |
          | SNS notification | ${SNS_STATUS} |

          ### What Needs to Happen

          1. Add eval instance mapping in \`launcher/recipe_templatization/evaluation/evaluation_regional_parameters.json\`
          2. Re-run this workflow — it will pass once all mappings are in place

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Eval Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md

      - name: Fail if eval coverage is missing
        if: steps.check-coverage.outputs.has_missing == 'true'
        run: |
          echo "❌ Eval instance mapping is missing for one or more models."
          echo "See the PR comment above for details."
          exit 1

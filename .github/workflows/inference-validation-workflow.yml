name: Inference Validation

# ── Workflow Behavior Matrix ──
#
# Scenario                                           | PR Comment                                | Ticket          | SNS       | Workflow
# ---------------------------------------------------|-------------------------------------------|-----------------|-----------|----------
# All hosting configs present                        | ✅ Success                                 | ❌ Skip          | ❌ Skip    | ✅ Pass
# Unmapped model (no JS ID)                          | ❌ "Missing JumpStart Model ID"            | ❌ Skip          | ❌ Skip    | ❌ Fail
# Missing hosting config + artifacts NOT found       | ⚠️ "Missing Training Artifacts"            | ❌ Skip          | ❌ Skip    | ❌ Fail
# Missing hosting config + artifacts found           | ⚠️ With ticket link + artifact URIs        | ✅ Create/Update | ✅ Send    | ❌ Fail

on:
  pull_request:
    branches:
      - main
    paths:
      - 'recipes_collection/recipes/**/*.yaml'
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-west-2
  # Default severity for recipe validation tickets (SEV-3)
  DEFAULT_SEVERITY: SEV_3
  # CTI (Category/Type/Item) for Inference team — placeholder, update when assigned
  INFERENCE_CTI: "AWS/IronMan/Infrastructure - Hosting DP"
  # Checkpoint sub-paths inside each training job output folder:
  #   - FFT recipes: hf_merged/ contains the full fine-tuned model
  #   - LORA recipes: hf/ contains the adapter, base-models/<id>/ has the base model
  INFERENCE_CHECKPOINT_SUFFIX_HF: "output/model/checkpoints/hf/"
  INFERENCE_CHECKPOINT_SUFFIX_HF_MERGED: "output/model/checkpoints/hf_merged/"

jobs:
  inference-validation:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR information
        id: get-pr-info
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_title=${PR_TITLE}" >> $GITHUB_OUTPUT
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "pr_author=${PR_AUTHOR}" >> $GITHUB_OUTPUT
          echo "pr_head_sha=${PR_HEAD_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Detect changed recipe files
        id: detect-changes
        run: |
          git fetch origin ${{ github.base_ref || 'main' }}:base_branch
          CHANGED_FILES=$(git diff base_branch...HEAD --name-only -- 'recipes_collection/recipes/**/*.yaml' | sort || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Check inference coverage for changed recipes
        id: check-coverage
        env:
          CHANGED_FILES: ${{ steps.detect-changes.outputs.changed_files }}
        run: |
          python .github/scripts/check_inference_coverage.py \
            --changed-files "$CHANGED_FILES" \
            --recipes-dir recipes_collection/recipes/fine-tuning \
            --model-id-map launcher/recipe_templatization/jumpstart_model-id_map.json \
            --inference-configs-dir utils/inference_configs

      # ── All hosting configs present: post success comment and exit ──
      - name: Post success PR comment
        if: steps.check-coverage.outputs.has_missing != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
        run: |
          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- inference-validation-workflow-comment -->
          ## ✅ Inference Validation Complete

          All recipe(s) checked in this PR have hosting configuration. No action required.

          | Check | Status |
          |-------|--------|
          | Recipe change detection | ✅ Complete |
          | Hosting configuration check | ✅ All present |
          | Tracking ticket | Not needed |
          | SNS notification | Not needed |

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Inference Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md \
            --marker "<!-- inference-validation-workflow-comment -->"

      # ── Unmapped models: post error comment and fail (no ticket/SNS) ──
      - name: Post unmapped-models PR comment
        if: steps.check-coverage.outputs.has_unmapped_models == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
        run: |
          # Build table of unmapped models — one row per recipe.
          UNMAPPED_ROWS=$(python3 -c "
          import json, os
          missing = json.loads(os.environ['MISSING_RECIPES'])
          for entry in missing:
              if entry.get('js_model_id') is None:
                  print(f'| \`{entry[\"run_name\"]}\` | \`{entry[\"recipe_path\"]}\` |')
          ")

          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- inference-validation-workflow-comment -->
          ## ❌ Inference Validation Failed — Missing JumpStart Model ID

          One or more recipes have \`run.name\` values that are **not found in \`jumpstart_model-id_map.json\`**.

          This must be fixed before the PR can merge. Ticket creation and inference automation were **skipped**.

          ### Unmapped Models

          | run.name | Recipe Path |
          |----------|-------------|
          ${UNMAPPED_ROWS}

          ### How to Fix

          Add the missing \`run.name\` → JumpStart model ID mapping in:
          \`launcher/recipe_templatization/jumpstart_model-id_map.json\`

          Then re-run this workflow.

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Inference Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md \
            --marker "<!-- inference-validation-workflow-comment -->"

          echo "❌ Unmapped models found. Fix jumpstart_model-id_map.json and re-run."
          exit 1

      # ── From here, has_unmapped_models is guaranteed false (early-fail above). ──
      # ── Steps only need to check has_missing == 'true' to proceed.              ──

      - name: Configure AWS credentials
        if: steps.check-coverage.outputs.has_missing == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PARTNER_TEAM_RECIPE_VALIDATION_GITHUB_WORKFLOW_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        if: steps.check-coverage.outputs.has_missing == 'true'
        run: aws sts get-caller-identity

      - name: Install AWS dependencies
        if: steps.check-coverage.outputs.has_missing == 'true'
        run: |
          pip install boto3 requests awscrt botocore[crt]

      - name: Resolve model artifact S3 URIs
        if: steps.check-coverage.outputs.has_missing == 'true'
        id: resolve-artifacts
        env:
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
        run: |
          python .github/scripts/resolve_model_artifacts.py \
            --missing-recipes "$MISSING_RECIPES" \
            --bucket hyperpod-recipes-validation-artifacts \
            --prefix validation_results/ \
            --base-model-prefix validation_results/base-models \
            --mode inference

      # ── Artifacts not all found: post warning comment and fail (no ticket/SNS) ──
      - name: Post missing-artifacts PR comment
        if: steps.resolve-artifacts.outputs.has_unresolved == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
          INFERENCE_CHECKPOINT_SUFFIX_HF: ${{ env.INFERENCE_CHECKPOINT_SUFFIX_HF }}
          INFERENCE_CHECKPOINT_SUFFIX_HF_MERGED: ${{ env.INFERENCE_CHECKPOINT_SUFFIX_HF_MERGED }}
        run: |
          # Build artifact status table — show the artifacts relevant to each PEFT type:
          #   FFT: needs hf_merged/ (the full fine-tuned model)
          #   LORA: needs hf/ (adapter) + base-models/<id>/ (base model)
          # When an artifact is found, display the actual S3 URI; otherwise show ❌ Not found.
          ARTIFACT_ROWS=$(python3 -c "
          import json, os

          artifact_data = json.loads(os.environ.get('ARTIFACT_DATA', '[]'))

          for ad in artifact_data:
              recipe_path = ad.get('recipe_path', '')
              recipe_name = os.path.splitext(os.path.basename(recipe_path))[0] if recipe_path else ''
              peft = ad.get('peft_type', 'LORA')

              if peft == 'FFT':
                  uri = ad.get('hf_merged_s3_uri', '')
                  uri_display = f'\`{uri}\`' if uri else '❌ Not found'
                  print(f'| \`{recipe_name}\` | FFT | {uri_display} | — |')
              else:
                  hf_uri = ad.get('hf_s3_uri', '')
                  base_uri = ad.get('base_model_s3_uri', '')
                  adapter_display = f'\`{hf_uri}\`' if hf_uri else '❌ Not found'
                  base_display = f'\`{base_uri}\`' if base_uri else '❌ Not found'
                  print(f'| \`{recipe_name}\` | LORA | {adapter_display} | {base_display} |')
          ")

          # Build "Recipes Requiring Action" table — one row per recipe.
          MODEL_ROWS=$(python3 -c "
          import json, os
          missing = json.loads(os.environ['MISSING_RECIPES'])
          for entry in missing:
              recipe_name = os.path.splitext(os.path.basename(entry['recipe_path']))[0]
              js_id = entry.get('js_model_id') or 'NOT MAPPED'
              reason = entry['reason']
              if 'jumpstart_model-id_map' in reason:
                  status = '❌ Not in model-id map'
              else:
                  status = '❌ Missing hosting config'
              print(f'| \`{recipe_name}\` | \`{js_id}\` | {status} |')
          ")

          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- inference-validation-workflow-comment -->
          ## ⚠️ Inference Validation — Missing Training Artifacts

          **${MISSING_COUNT} recipe(s)** are missing hosting configuration, and trained artifacts were **not found in S3** for some or all recipes.

          Ticket creation and inference team notification were **skipped** because artifacts must be available first.

          ### Recipes Requiring Action

          | Recipe | JumpStart ID | Hosting Config |
          |--------|-------------|---------------|
          ${MODEL_ROWS}

          ### Recipe Artifact Status

          > For inference:
          > - **FFT** recipes require the merged model from \`hf_merged/\`
          > - **LoRA** recipes require the adapter from \`hf/\` **and** the base model from \`base-models/\`

          | Recipe | PEFT | Training Artifact | Base Model |
          |--------|------|-------------------|------------|
          ${ARTIFACT_ROWS}

          > **Searched:** \`s3://hyperpod-recipes-validation-artifacts/validation_results/\`
          > **FFT model path:** \`s3://hyperpod-recipes-validation-artifacts/validation_results/<run>/<id>/FFT/<type>/<instance>/<job>/${INFERENCE_CHECKPOINT_SUFFIX_HF_MERGED}\`
          > **LoRA adapter path:** \`s3://hyperpod-recipes-validation-artifacts/validation_results/<run>/<id>/LORA/<type>/<instance>/<job>/${INFERENCE_CHECKPOINT_SUFFIX_HF}\`
          > **Base model path:** \`s3://hyperpod-recipes-validation-artifacts/validation_results/base-models/<id>/\`

          ### What Needs to Happen

          1. Upload base model artifacts to the expected S3 location: \`s3://hyperpod-recipes-validation-artifacts/validation_results/base-models/<js_model_id>/\`
          2. Run the [one-click validation workflow](https://github.com/aws/private-sagemaker-hyperpod-recipes-staging/actions/workflows/orchestrator_validation.yml) with **convergence enabled** to generate training artifacts
          3. Re-run this workflow — once all artifacts are found, a tracking ticket will be created and the inference team automation will be triggered via SNS

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Inference Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md \
            --marker "<!-- inference-validation-workflow-comment -->"

          echo "❌ Training artifacts not found. Upload artifacts and re-run."
          exit 1

      # ── From here, has_unresolved is guaranteed false (early-fail above). ──

      - name: Build ticket description
        if: steps.check-coverage.outputs.has_missing == 'true'
        id: build-description
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_URL: ${{ steps.get-pr-info.outputs.pr_url }}
          PR_AUTHOR: ${{ steps.get-pr-info.outputs.pr_author }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
        run: |
          python3 << 'PYEOF'
          import json
          import os

          pr_number = os.environ["PR_NUMBER"]
          pr_url = os.environ["PR_URL"]
          pr_author = os.environ["PR_AUTHOR"]
          pr_head_sha = os.environ["PR_HEAD_SHA"]
          missing_count = os.environ["MISSING_COUNT"]
          missing_recipes = json.loads(os.environ["MISSING_RECIPES"])

          artifact_data = []
          try:
              artifact_data = json.loads(os.environ.get("ARTIFACT_DATA", "[]"))
          except (json.JSONDecodeError, TypeError):
              pass

          # Build lookup keyed by recipe_path for per-recipe artifact info.
          # This correctly handles multiple recipes sharing the same model-id
          # (e.g. FFT + LoRA variants) which have different PEFT types and artifact paths.
          artifact_by_recipe = {}
          for ad in artifact_data:
              rp = ad.get("recipe_path", "")
              if rp:
                  artifact_by_recipe[rp] = ad

          lines = []
          lines.append("## Hosting Configuration Required\n")
          lines.append(f"**{missing_count} recipe(s)** are missing inference hosting configuration.\n")
          lines.append("### Pull Request Context\n")
          lines.append(f"- **PR:** [#{pr_number}]({pr_url})")
          lines.append(f"- **Author:** {pr_author}")
          lines.append(f"- **HEAD SHA:** `{pr_head_sha}`\n")

          lines.append("### Recipes Missing Hosting Configuration\n")
          lines.append("> **Artifact usage for inference:**")
          lines.append("> - **FFT** recipes: the merged model from `hf_merged/` is sent as `base_model_s3_uri`")
          lines.append("> - **LoRA** recipes: the adapter from `hf/` is sent as `adapter_artifact_url`, "
                       "and the base model from `base-models/` as `base_model_s3_uri`\n")

          for entry in missing_recipes:
              js_model_id = entry.get("js_model_id") or "NOT MAPPED"
              reason = entry["reason"]
              rp = entry["recipe_path"]

              ad = artifact_by_recipe.get(rp, {})
              peft_type = ad.get("peft_type", "LORA")
              hf_uri = ad.get("hf_s3_uri", "")
              hf_merged_uri = ad.get("hf_merged_s3_uri", "")
              base_model_uri = ad.get("base_model_s3_uri", "")

              recipe_stem = os.path.splitext(os.path.basename(rp))[0]
              lines.append(f"#### `{recipe_stem}`")
              lines.append(f"- **Recipe:** `{rp}`")
              lines.append(f"- **JumpStart Model ID:** `{js_model_id}`")
              lines.append(f"- **PEFT Type:** {peft_type}")
              lines.append(f"- **Reason:** {reason}")

              # Show artifacts matching what will actually be sent via SNS
              if peft_type == "FFT":
                  if hf_merged_uri:
                      lines.append(f"- **Model Artifact (hf_merged/):** `{hf_merged_uri}`")
                  else:
                      lines.append("- **Model Artifact (hf_merged/):** ⚠️ Not found in S3")
              else:
                  # LORA
                  if hf_uri:
                      lines.append(f"- **Adapter Artifact (hf/):** `{hf_uri}`")
                  else:
                      lines.append("- **Adapter Artifact (hf/):** ⚠️ Not found in S3")
                  if base_model_uri:
                      lines.append(f"- **Base Model:** `{base_model_uri}`")
                  else:
                      lines.append("- **Base Model:** ⚠️ Not found in S3")

              lines.append("")

          lines.append("### Required Actions\n")
          lines.append("1. Run inference validation tests against the trained model checkpoints")
          lines.append("2. Generate hosting configuration (`hosting-<recipe_stem>.json`) for each recipe")
          lines.append("3. Contribute the hosting configs back to the recipes repo")
          lines.append("4. Resolve this ticket once the hosting configs are added\n")
          lines.append("---")
          lines.append("*This ticket was automatically created by the Inference Validation GitHub Workflow*")

          description = "\n".join(lines)

          gh_output = os.environ.get("GITHUB_OUTPUT", "")
          if gh_output:
              with open(gh_output, "a") as f:
                  f.write(f"description<<EOFMARKER\n{description}\nEOFMARKER\n")

          print(description)
          PYEOF

      - name: Create or update ticket
        if: steps.check-coverage.outputs.has_missing == 'true'
        id: create-ticket
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_URL: ${{ steps.get-pr-info.outputs.pr_url }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          TICKET_DESCRIPTION: ${{ steps.build-description.outputs.description }}
        run: |
          TITLE="[Inference Validation] ${MISSING_COUNT} Recipe(s) Missing Hosting Configuration"

          UPDATE_COMMENT="Updated from PR #${PR_NUMBER}.

          **Commit:** \`${PR_HEAD_SHA}\`
          **PR URL:** ${PR_URL}
          **Missing recipes:** ${MISSING_COUNT}"

          python .github/scripts/tickety.py \
            --title "$TITLE" \
            --description "$TICKET_DESCRIPTION" \
            --severity "$DEFAULT_SEVERITY" \
            --cti "$INFERENCE_CTI" \
            --deduplicator "inference-validation-pr-${PR_NUMBER}" \
            --update-comment "$UPDATE_COMMENT"

      - name: Trigger Inference validation via SNS
        if: steps.create-ticket.outputs.action == 'CREATED'
        id: trigger-sns
        continue-on-error: true
        env:
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
          TICKET_ID: ${{ steps.create-ticket.outputs.ticket_id }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          SNS_TOPIC_ARN: "arn:aws:sns:us-west-2:417648003608:lora-validation-trigger-prod"
        run: |
          echo "=== Notifying Inference Team via SNS ==="

          # Publish one SNS message per model entry.
          # The trigger lambda (CR-266370446) expects a single JSON object per
          # SNS record with the following required fields:
          #   model_id, base_model_s3_uri, adapter_artifact_url
          # Optional tracking fields: pr_number, ticket_id
          # All other fields (instance_types, num_adapters, phased, etc.) have
          # sensible defaults in the lambda and are auto-derived.
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          artifact_data = json.loads(os.environ["ARTIFACT_DATA"])
          pr_number = os.environ["PR_NUMBER"]
          ticket_id = os.environ["TICKET_ID"]
          topic_arn = os.environ["SNS_TOPIC_ARN"]

          published = 0
          for entry in artifact_data:
              peft_type = entry.get("peft_type", "LORA")
              hf_uri = entry.get("hf_s3_uri", "")
              hf_merged_uri = entry.get("hf_merged_s3_uri", "")
              base_model_uri = entry.get("base_model_s3_uri", "")

              # Build SNS message based on PEFT type:
              # - FFT: hf_merged/ is the full model → base_model_s3_uri, no adapter
              # - LORA: hf/ is the adapter → adapter_artifact_url, base-models/ is base
              if peft_type == "FFT":
                  message = {
                      "model_id": entry["model-id"],
                      "base_model_s3_uri": hf_merged_uri,
                      "pr_number": pr_number,
                      "ticket_id": ticket_id,
                  }
              else:
                  message = {
                      "model_id": entry["model-id"],
                      "base_model_s3_uri": base_model_uri,
                      "adapter_artifact_url": hf_uri,
                      "pr_number": pr_number,
                      "ticket_id": ticket_id,
                  }

              print(f"  Publishing: model_id={message['model_id']}")
              print(f"    {json.dumps(message, indent=2)}")

              result = subprocess.run(
                  [
                      "aws", "sns", "publish",
                      "--topic-arn", topic_arn,
                      "--message", json.dumps(message),
                  ],
                  capture_output=True, text=True,
              )
              if result.returncode != 0:
                  print(f"  ❌ SNS publish failed: {result.stderr}", file=sys.stderr)
                  sys.exit(1)
              published += 1
              print(f"  ✅ Published ({result.stdout.strip()})")

          print(f"\nSNS notifications sent: {published}/{len(artifact_data)}")
          PYEOF

      - name: Post detailed PR comment
        if: steps.create-ticket.outputs.ticket_id != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.get-pr-info.outputs.pr_head_sha }}
          TICKET_ID: ${{ steps.create-ticket.outputs.ticket_id }}
          ACTION: ${{ steps.create-ticket.outputs.action }}
          MISSING_COUNT: ${{ steps.check-coverage.outputs.missing_count }}
          MISSING_RECIPES: ${{ steps.check-coverage.outputs.missing_recipes }}
          ARTIFACT_DATA: ${{ steps.resolve-artifacts.outputs.artifact_data }}
          SNS_OUTCOME: ${{ steps.trigger-sns.outcome }}
        run: |
          # Determine ticket action display
          case "$ACTION" in
            CREATED) ACTION_DISPLAY="🆕 Created" ;;
            UPDATED) ACTION_DISPLAY="📝 Updated" ;;
            *)       ACTION_DISPLAY="ℹ️ $ACTION" ;;
          esac

          # Determine SNS status based on actual outcome
          if [ "$ACTION" = "CREATED" ]; then
            if [ "$SNS_OUTCOME" = "success" ]; then
              SNS_STATUS="✅ Sent"
            else
              SNS_STATUS="❌ Failed (see workflow logs)"
            fi
          else
            SNS_STATUS="⏭️ Skipped (ticket already open)"
          fi

          # Build the recipe status table — one row per recipe.
          RECIPE_ROWS=$(python3 -c "
          import json, os
          missing = json.loads(os.environ['MISSING_RECIPES'])
          for entry in missing:
              recipe_name = os.path.splitext(os.path.basename(entry['recipe_path']))[0]
              js_id = entry.get('js_model_id') or 'NOT MAPPED'
              reason = entry['reason']
              if 'jumpstart_model-id_map' in reason:
                  status = '❌ Not in model-id map'
              else:
                  status = '❌ Missing hosting config'
              print(f'| \`{recipe_name}\` | \`{js_id}\` | {status} |')
          ")

          # Build artifact details showing what was sent (or will be sent) to inference team
          ARTIFACT_DETAILS=$(python3 -c "
          import json, os
          artifact_data = json.loads(os.environ.get('ARTIFACT_DATA', '[]'))

          for ad in artifact_data:
              recipe_path = ad.get('recipe_path', '')
              recipe_name = os.path.splitext(os.path.basename(recipe_path))[0] if recipe_path else ''
              peft = ad.get('peft_type', 'LORA')

              if peft == 'FFT':
                  uri = ad.get('hf_merged_s3_uri', '')
                  print(f'| \`{recipe_name}\` | FFT | \`{uri}\` | — |')
              else:
                  hf_uri = ad.get('hf_s3_uri', '')
                  base_uri = ad.get('base_model_s3_uri', '')
                  print(f'| \`{recipe_name}\` | LORA | \`{hf_uri}\` | \`{base_uri}\` |')
          ")

          cat > /tmp/pr_comment.md << EOFCOMMENT
          <!-- inference-validation-workflow-comment -->
          ## ⚠️ Inference Validation — Hosting Configuration Required

          **${MISSING_COUNT} recipe(s)** in this PR are missing inference hosting configuration.

          ### Recipes Requiring Action

          | Recipe | JumpStart ID | Hosting Config |
          |--------|-------------|---------------|
          ${RECIPE_ROWS}

          ### Artifacts Sent to Inference Team

          > - **FFT**: merged model (\`hf_merged/\`) sent as \`base_model_s3_uri\`
          > - **LoRA**: adapter (\`hf/\`) sent as \`adapter_artifact_url\`, base model sent as \`base_model_s3_uri\`

          | Recipe | PEFT | Training Artifact | Base Model |
          |--------|------|-------------------|------------|
          ${ARTIFACT_DETAILS}

          ### Tracking

          | Item | Status |
          |------|--------|
          | Recipe change detection | ✅ Complete |
          | Hosting configuration check | ⚠️ ${MISSING_COUNT} recipe(s) missing |
          | Tracking ticket | ${ACTION_DISPLAY} — [${TICKET_ID}](https://t.corp.amazon.com/${TICKET_ID}) |
          | SNS notification | ${SNS_STATUS} |

          ### What Needs to Happen

          1. Add hosting configurations at \`utils/inference_configs/hosting-<recipe_stem>.json\` for the above recipe(s)
          2. Re-run this workflow — it will pass once all the hosting configs are in place

          <sub>Commit: \`${PR_HEAD_SHA:0:8}\` · Managed by the Inference Validation workflow</sub>
          EOFCOMMENT

          python .github/scripts/post_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "$PR_NUMBER" \
            --body-file /tmp/pr_comment.md \
            --marker "<!-- inference-validation-workflow-comment -->"

      - name: Fail if inference coverage is missing
        if: steps.check-coverage.outputs.has_missing == 'true'
        run: |
          echo "❌ Hosting configuration is missing for one or more recipes."
          echo "See the PR comment above for details."
          exit 1

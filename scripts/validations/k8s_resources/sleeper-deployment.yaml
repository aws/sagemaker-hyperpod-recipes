apiVersion: apps/v1
kind: Deployment
metadata:
  name: hp-recipe-validator-sleeper
  labels:
    app: hp-recipe-validator-sleeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hp-recipe-validator-sleeper
  template:
    metadata:
      labels:
        app: hp-recipe-validator-sleeper
    spec:
      containers:
        - name: sleeper
          image: python:3.11-slim
          command: ["/bin/sh", "-c", "apt-get update && apt-get install -y --no-install-recommends tar curl jq unzip && curl -sL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscli.zip && unzip -q /tmp/awscli.zip -d /tmp && /tmp/aws/install && rm -rf /tmp/aws /tmp/awscli.zip && pip install --no-cache-dir huggingface-hub && while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: "100m"
              memory: "4Gi"
            limits:
              cpu: "500m"
              memory: "8Gi"
          volumeMounts:
            - name: fsx-volume
              mountPath: /data
      volumes:
        - name: fsx-volume
          persistentVolumeClaim:
            claimName: fsx-claim
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Always

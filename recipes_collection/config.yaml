defaults:
  - _self_
  - cluster: slurm # set to `slurm`, `k8s` or `sm_jobs`, depending on the desired cluster
  - recipes: training/custom_model/falcon # select desired config inside the training directory
  - override hydra/job_logging: stdout

cluster_type: slurm # bcm, bcp, k8s or sm_jobs. If bcm, k8s or sm_jobs, it must match - cluster above.
# If using sm_jobs cluster_type, set sm_jobs_config. See cluster/sm_jobs.yaml for example.

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://recipes_collection/recipes/fine-tuning

debug: False
dry_run: false
launch_json: false

instance_type: p5.48xlarge

# Per-service instance type overrides for mixed-instance jobs (e.g., RFT).
# GPU services (training, vllm_generation) default to instance_type above.
# CPU services (hub, nats_server, prompter, rbs, redis) can use cheaper CPU instances.
# Example:
#   instance_types:
#     training: ml.p5.48xlarge
#     vllm_generation: ml.p5.48xlarge
#     hub: ml.r6i.24xlarge
#     nats_server: ml.r6i.24xlarge
#     prompter: ml.r6i.24xlarge
#     rbs: ml.r6i.24xlarge
#     redis: ml.r6i.24xlarge
instance_types: null

base_results_dir: null # Location to store the results, checkpoints and logs.

container: null

git:
  repo_url_or_path: null
  branch: null
  commit: null
  entry_script: null
  entry_module: null
  token: null
  update_adapter: false # if true it will re-install the Adapter code but not its dependencies
  use_default: True

env_vars:
  NCCL_DEBUG: WARN # Logging level for NCCL. Set to "INFO" for debug information

# Do not modify below, use the values above instead.
training_config: ${hydra:runtime.choices.recipes}

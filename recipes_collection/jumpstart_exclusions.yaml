# JumpStart Recipe Exclusion Patterns
#
# Regex patterns for recipes that should NOT be published to JumpStart.
# Matched against recipe IDs (e.g. "fine-tuning/llama/llmft_llama3_1_8b_...").
# Uses re.search(), so patterns match anywhere unless anchored with ^ / $.
#
# This file replaces the MODEL_ALLOWLIST in the JumpStart Lambda
# (SageMakerJumpStartHyperPodRecipeScripts/constants.py).
# The patterns are passed to the Lambda's exclusionPatterns argument
# (see CR-260699046).

exclusion_patterns:
  # Nova evaluation recipes on the JumpStart RECIPE_DENYLIST
  - "multi_modal_benchmark_eval$"
  - "llm_judge_eval$"
  - "rubric_llm_judge_eval$"
  - "full_fine_tuning$"
  - "gpu_fine_tuning$"
  - "llama[_-]4[_-]scout"
  # Checkpointless recipes are not published to Jumpstart
  - "checkpointless"
  # Block Verl SFT recipes for Qwen models other than 3-dot-5 and 3-dot-6
  - "verl-sft-qwen-3-(?!dot-[56])"
  - "verl-sft-qwen-2-5"
  # Block gpt_oss-0_7_0 and qwen-0_7_0/qwen-3-32b recipes (use verl 0.5.0 versions instead)
  - "gpt_oss-0_7_0/"
  - "qwen-0_7_0/.*qwen-3-32b"
  - "verl-sft-gpt-oss-20b-lora"

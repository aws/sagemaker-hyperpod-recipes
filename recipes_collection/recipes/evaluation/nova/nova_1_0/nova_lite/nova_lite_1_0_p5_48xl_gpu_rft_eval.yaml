evaluation:
  metric: all
  strategy: rft_eval
  task: rft_eval
inference:
  max_new_tokens: 8196
  temperature: 0
  top_k: -1
  top_logprobs: 0
  top_p: 1.0
rl_env:
  reward_lambda_arn: arn:aws:lambda:<region>:<account_id>:function:<reward-function-name>
run:
  data_s3_path: ''
  mlflow_experiment_name: ''
  mlflow_run_name: ''
  mlflow_tracking_uri: ''
  model_name_or_path: s3://escrow_bucket/model_location or nova-lite/prod
  model_type: amazon.nova-lite-v1:0:300k
  name: nova-lite-rft-eval-job
  output_s3_path: ''
  replicas: 1

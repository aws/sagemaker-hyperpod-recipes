display_name: Gemma 4 31B IT SFT LoRA Fine-Tuning (Text)
instance_types:
- ml.p5.48xlarge
run:
  model_type: verl
  name: verl-sft-gemma-4-31b-it-lora
  results_dir: ${base_results_dir}/${.name}
trainer:
  devices: 8
  num_nodes: 1
training_config:
  checkpoint:
    _target_: verl.trainer.config.CheckpointConfig
    load_contents:
    - model
    - optimizer
    - extra
    - hf_model
    save_contents:
    - model
    - optimizer
    - extra
    - hf_model
    save_only_adapter_if_lora: true
  data:
    apply_chat_template_kwargs:
      enable_thinking: false
    custom_cls:
      name: null
      path: null
    ignore_input_ids_mismatch: false
    max_length: 32768
    max_token_len_per_gpu: 33280
    messages_key: messages
    micro_batch_size_per_gpu: 1
    pad_mode: no_padding
    train_batch_size: 128
    train_files: null
    train_val_split_ratio: 1.0
    truncation: left
    use_dynamic_bsz: true
    val_files: null
  engine:
    _target_: verl.workers.config.FSDPEngineConfig
    dtype: bfloat16
    entropy_checkpointing: false
    entropy_from_logits_with_chunking: false
    forward_only: false
    forward_prefetch: false
    fsdp_size: -1
    full_determinism: false
    model_dtype: bfloat16
    offload_policy: false
    optimizer_offload: false
    param_offload: false
    reshard_after_forward: true
    seed: 42
    strategy: fsdp2
    ulysses_sequence_parallel_size: 1
    use_orig_params: false
    use_torch_compile: true
    wrap_policy:
      min_num_params: 0
  mlflow:
    run_id: ''
    tracking_uri: ''
  model:
    _target_: verl.workers.config.HFModelConfig
    custom_chat_template: null
    enable_activation_offload: false
    enable_gradient_checkpointing: true
    exclude_modules: .*vision_tower.*|.*embed_vision.*|.*embed_audio.*|.*audio_tower.*|.*router.*|.*experts.*
    external_lib: null
    fused_kernel_options:
      impl_backend: torch
    hf_config_path: null
    lora_adapter_path: null
    lora_alpha: 128
    lora_rank: 64
    override_config:
      attn_implementation: flash_attention_2
    path: google/gemma-4-31B-it
    target_modules: .*q_proj.*|.*k_proj.*|.*v_proj.*|.*o_proj.*|.*gate_proj.*|.*up_proj.*|.*down_proj.*
    tiled_mlp:
      enabled: false
      num_shards: 4
    tokenizer_path: null
    trust_remote_code: true
    use_fused_kernels: true
    use_liger: false
    use_remove_padding: true
    use_shm: false
  optim:
    _target_: verl.workers.config.FSDPOptimizerConfig
    betas:
    - 0.9
    - 0.999
    clip_grad: 1.0
    lr: 5.0e-05
    lr_scheduler_type: constant
    lr_warmup_steps: 10
    lr_warmup_steps_ratio: 0.0
    min_lr_ratio: 0.0
    num_cycles: 0.5
    optimizer: AdamW
    optimizer_impl: torch.optim
    override_optimizer_config: null
    total_training_steps: -1
    warmup_style: null
    weight_decay: 0.01
  profiler:
    _target_: verl.utils.profiler.ProfilerConfig
    all_ranks: false
    enable: false
    ranks: []
    save_path: outputs/profile
    tool: torch
    tool_config:
      npu:
        _target_: verl.utils.profiler.config.NPUToolConfig
        analysis: true
        contents: []
        discrete: false
        level: level0
        name: npu
      nsys:
        _target_: verl.utils.profiler.config.NsightToolConfig
        discrete: ${oc.select:recipes.training_config.global_profiler.global_tool_config.nsys.discrete}
        name: nsight
      torch:
        _target_: verl.utils.profiler.config.TorchProfilerToolConfig
        manual_save: true
        name: torch
        step_end: null
        step_start: 0
      torch_memory:
        _target_: verl.utils.profiler.config.TorchMemoryToolConfig
        name: torch_memory
        stack_depth: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.stack_depth,32}
        trace_alloc_max_entries: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
  trainer:
    default_hdfs_dir: null
    default_local_dir: /opt/ml/model
    device: cuda
    experiment_name: gemma-4-31b-it-sft-lora
    logger:
    - console
    - mlflow
    - tensorboard
    max_ckpt_to_keep: null
    merge_lora_on_final_save: true
    n_gpus_per_node: 8
    nnodes: 1
    profile_interval:
    - -1
    - -1
    project_name: gemma4-sft
    resume_from_path: null
    resume_mode: auto
    save_freq: after_each_epoch
    test_freq: 5
    total_epochs: 3
    total_training_steps: null
  trainer_callbacks:
  - _target_: metering_callback.MeteringCallback
    output_path: /opt/ml/metering
version: 2.0.1

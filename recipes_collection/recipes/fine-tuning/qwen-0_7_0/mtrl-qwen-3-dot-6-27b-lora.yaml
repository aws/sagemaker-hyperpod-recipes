async_config:
  max_steps_off_policy: 3
batch:
  group_size: 8
  training_batch_size: 128
  val_batch_size: null
  val_group_size: 1
  val_random_sample: false
display_name: Agentic RFT for Qwen 3.6 27B Lora
model:
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  grad_clip_norm: 1.0
  learning_rate: 4.0e-05
  lora_alpha: 64
  lora_rank: 32
  max_sequence_length: 65536
  model_name: Qwen/Qwen3.6-27B
  weight_decay: 0.0
recipe_version: 1.0.16
rl:
  advantage_method: group_based
  advantage_normalization: true
  clip_high_threshold: 1.2
  clip_low_threshold: 0.8
  gamma: 1.0
  loss_fn: ppo
rollout:
  max_concurrency: 96
  max_retries: 3
  rollout_tps: 5
  timeout: 600.0
run:
  model_type: mtrl
  name: mtrl-qwen-3-dot-6-27b-lora
sampling_params:
  max_tokens: 4096
  temperature: 1.0
  top_p: 1.0
schedule:
  epochs: 1
  max_steps: 100
  save_every: 1
  val_at_start: true
  val_every: 10
val_metrics_config:
  pass_k_values:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  success_threshold: 1.0
val_sampling_params:
  max_tokens: 4096
  temperature: 0.0
  top_p: 1.0

        entropy_checkpointing: false
        entropy_from_logits_with_chunking: false
        forward_only: false
        forward_prefetch: false
        fsdp_size: 8
        full_determinism: false
        model_dtype: bfloat16
        offload_policy: false
        optimizer_offload: false
        param_offload: false
        reshard_after_forward: true
        seed: 42
        strategy: fsdp
        ulysses_sequence_parallel_size: 1
        use_orig_params: false
        use_torch_compile: true
        wrap_policy:
          min_num_params: 0
      lora_alpha: 16
      lora_rank: 0
      override_config: {}
      path: deepseek-ai/deepseek-llm-7b-chat
      target_modules: all-linear
      tiled_mlp:
        enabled: false
        num_shards: 4
      tokenizer_path: ${oc.select:recipes.training_config.actor_rollout_ref.model.path,null}
      trust_remote_code: ${oc.select:recipes.training_config.actor_rollout_ref.model.trust_remote_code,false}
      use_remove_padding: false
      use_shm: false
    optim:
      _target_: verl.workers.config.FSDPOptimizerConfig
      betas:
      - 0.9
      - 0.999
      clip_grad: 1.0
      lr: 1.0e-05
      lr_scheduler_type: constant
      lr_warmup_steps: -1
      lr_warmup_steps_ratio: 0.0
      min_lr_ratio: 0.0
      num_cycles: 0.5
      optimizer: AdamW
      optimizer_impl: torch.optim
      override_optimizer_config: null
      total_training_steps: -1
      warmup_style: null
      weight_decay: 0.01
    ppo_epochs: ${oc.select:recipes.training_config.actor_rollout_ref.actor.ppo_epochs,1}
    ppo_max_token_len_per_gpu: 32768
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: ${oc.select:.ppo_micro_batch_size,null}
    ppo_mini_batch_size: ${oc.select:recipes.training_config.actor_rollout_ref.actor.ppo_mini_batch_size,256}

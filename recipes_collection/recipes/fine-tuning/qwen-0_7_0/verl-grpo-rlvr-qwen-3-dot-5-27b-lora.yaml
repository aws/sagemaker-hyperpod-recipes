display_name: Qwen 3.5 27B GRPO RLVR Fine-Tuning with LoRA
instance_types:
- ml.p5en.48xlarge
- ml.p5e.48xlarge
ray_cluster:
  head_node:
    cpu: '16'
    cpuLimit: null
    gpu: '0'
    memory: 32Gi
    memoryLimit: null
  worker_nodes:
    cpu: '48'
    cpuLimit: null
    gpu: '8'
    memory: 144Gi
    memoryLimit: null
    replicas: 1
run:
  model_type: verl
  name: verl-grpo-qwen-3-dot-5-27b-lora
  results_dir: ${base_results_dir}/${.name}
trainer:
  num_nodes: 1
training_config:
  actor_rollout_ref:
    actor:
      _target_: verl.workers.config.FSDPActorConfig
      calculate_entropy: false
      checkpoint:
        _target_: verl.trainer.config.CheckpointConfig
        async_save: false
        load_contents: ${.save_contents}
        save_contents:
        - model
        - optimizer
        - extra
        - hf_model
      clip_ratio: 0.2
      clip_ratio_c: 3.0
      clip_ratio_high: 0.28
      clip_ratio_low: 0.2
      data_loader_seed: 42
      entropy_advantage: false
      entropy_advantage_alpha: 0.4
      entropy_advantage_kappa: 2
      entropy_checkpointing: false
      entropy_coeff: 0
      entropy_from_logits_with_chunking: false
      freeze_vision_tower: false
      fsdp_config:
        _target_: verl.workers.config.FSDPEngineConfig
        dtype: bfloat16
        entropy_checkpointing: false
        entropy_from_logits_with_chunking: false
        forward_only: false
        forward_prefetch: false
        fsdp_size: 8
        full_determinism: false
        model_dtype: bfloat16
        offload_policy: false
        optimizer_offload: false
        param_offload: false
        reshard_after_forward: true
        seed: 42
        strategy: fsdp2
        ulysses_sequence_parallel_size: 1
        use_orig_params: false
        use_torch_compile: true
        wrap_policy:
          min_num_params: 0
          transformer_layer_cls_to_wrap:
          - Qwen3_5DecoderLayer
          - Qwen3_5VisionBlock
      grad_clip: 1.0
      kl_loss_coef: 0
      kl_loss_type: low_var_kl
      loss_agg_mode: token-mean
      loss_scale_factor: null
      optim:
        _target_: verl.workers.config.FSDPOptimizerConfig
        betas:
        - 0.9
        - 0.999
        clip_grad: 1.0
        lr: 1.0e-05
        lr_scheduler_type: constant
        lr_warmup_steps: -1
        lr_warmup_steps_ratio: 0.0
        min_lr_ratio: 0.0
        num_cycles: 0.5
        optimizer: AdamW
        optimizer_impl: torch.optim
        override_optimizer_config: null
        total_training_steps: -1
        warmup_style: null
        weight_decay: 0.01
      policy_loss:
        _target_: verl.workers.config.PolicyLossConfig
        clip_cov_lb: 1.0
        clip_cov_ratio: 0.0002
        clip_cov_ub: 5.0
        kl_cov_ratio: 0.0002
        loss_mode: vanilla
        ppo_kl_coef: 0.1
      ppo_epochs: 1
      ppo_max_token_len_per_gpu: 32768
      ppo_micro_batch_size: null
      ppo_micro_batch_size_per_gpu: null
      ppo_mini_batch_size: 32
      profiler:
        _target_: verl.utils.profiler.ProfilerConfig
        all_ranks: false
        enable: false
        ranks: []
        save_path: ${oc.select:recipes.training_config.global_profiler.save_path,null}
        tool: ${oc.select:recipes.training_config.global_profiler.tool,null}
        tool_config:
          npu:
            _target_: verl.utils.profiler.config.NPUToolConfig
            analysis: true
            contents: []
            discrete: false
            level: level0
          nsys:
            _target_: verl.utils.profiler.config.NsightToolConfig
            discrete: ${oc.select:recipes.training_config.global_profiler.global_tool_config.nsys.discrete}
          torch:
            _target_: verl.utils.profiler.config.TorchProfilerToolConfig
            step_end: null
            step_start: 0
          torch_memory:
            _target_: verl.utils.profiler.config.TorchMemoryToolConfig
            stack_depth: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.stack_depth,32}
            trace_alloc_max_entries: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
      rollout_n: ${oc.select:recipes.training_config.actor_rollout_ref.rollout.n,8}
      router_replay:
        _target_: verl.workers.config.RouterReplayConfig
        mode: disabled
        record_file: null
        replay_file: null
      shuffle: false
      strategy: fsdp2
      tau_neg: 1.05
      tau_pos: 1.0
      ulysses_sequence_parallel_size: 1
      use_dynamic_bsz: true
      use_fused_kernels: ${oc.select:recipes.training_config.actor_rollout_ref.model.use_fused_kernels,false}
      use_kl_loss: false
      use_remove_padding: ${oc.select:recipes.training_config.actor_rollout_ref.model.use_remove_padding,false}
      use_torch_compile: true
    hybrid_engine: true
    model:
      _target_: verl.workers.config.HFModelConfig
      custom_chat_template: null
      enable_activation_offload: false
      enable_gradient_checkpointing: true
      exclude_modules: .*visual.*
      external_lib: null
      fused_kernel_options:
        impl_backend: torch
      hf_config_path: null
      is_saving_checkpoint_in_lora: true
      lora_adapter_path: null
      lora_alpha: 64
      lora_rank: 32
      override_config: {}
      patch_full_model: false
      patched_model_path: null
      path: Qwen/Qwen3.5-27B
      target_modules: all-linear
      tiled_mlp:
        enabled: false
        num_shards: 4
      tokenizer_path: null
      trust_remote_code: false
      use_fused_kernels: false
      use_liger: false
      use_remove_padding: true
      use_shm: false
    nccl_timeout: 600
    ref:
      _target_: verl.workers.config.FSDPActorConfig
      entropy_checkpointing: false
      entropy_from_logits_with_chunking: true
      fsdp_config:
        _target_: verl.workers.config.FSDPEngineConfig
        dtype: bfloat16
        entropy_checkpointing: false
        entropy_from_logits_with_chunking: false
        forward_only: true
        forward_prefetch: false
        fsdp_size: 8
        full_determinism: false
        model_dtype: bfloat16
        offload_policy: false
        optimizer_offload: false
        param_offload: true
        reshard_after_forward: true
        seed: 42
        strategy: fsdp2
        ulysses_sequence_parallel_size: 1
        use_orig_params: false
        use_torch_compile: true
        wrap_policy:
          min_num_params: 0
          transformer_layer_cls_to_wrap:
          - Qwen3_5DecoderLayer
          - Qwen3_5VisionBlock
      log_prob_max_token_len_per_gpu: 32768
      log_prob_micro_batch_size: null
      log_prob_micro_batch_size_per_gpu: null
      log_prob_use_dynamic_bsz: true
      profiler:
        _target_: verl.utils.profiler.ProfilerConfig
        all_ranks: false
        enable: false
        ranks: []
        save_path: ${oc.select:recipes.training_config.global_profiler.save_path,null}
        tool: ${oc.select:recipes.training_config.global_profiler.tool,null}
        tool_config:
          npu:
            _target_: verl.utils.profiler.config.NPUToolConfig
            analysis: true
            contents: []
            discrete: false
            level: level0
          nsys:
            _target_: verl.utils.profiler.config.NsightToolConfig
            discrete: ${oc.select:recipes.training_config.global_profiler.global_tool_config.nsys.discrete}
          torch:
            _target_: verl.utils.profiler.config.TorchProfilerToolConfig
            step_end: null
            step_start: 0
          torch_memory:
            _target_: verl.utils.profiler.config.TorchMemoryToolConfig
            stack_depth: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.stack_depth,32}
            trace_alloc_max_entries: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
      rollout_n: ${oc.select:recipes.training_config.actor_rollout_ref.rollout.n,8}
      router_replay:
        _target_: verl.workers.config.RouterReplayConfig
        mode: disabled
        record_file: null
        replay_file: null
      strategy: ${recipes.training_config.actor_rollout_ref.actor.strategy}
      ulysses_sequence_parallel_size: ${oc.select:recipes.training_config.actor_rollout_ref.actor.ulysses_sequence_parallel_size,1}
      use_torch_compile: ${oc.select:recipes.training_config.actor_rollout_ref.actor.use_torch_compile,true}
    rollout:
      _target_: verl.workers.config.RolloutConfig
      agent:
        _target_: verl.workers.config.AgentLoopConfig
        agent_loop_config_path: null
        custom_async_server:
          _target_: verl.workers.config.CustomAsyncServerConfig
          name: null
          path: null
        default_agent_loop: single_turn_agent
        num_workers: 8
      calculate_log_probs: true
      cudagraph_capture_sizes: null
      data_parallel_size: 1
      disable_log_stats: true
      do_sample: true
      dtype: bfloat16
      enable_chunked_prefill: true
      enable_prefix_caching: true
      enable_rollout_routing_replay: false
      enforce_eager: false
      engine_kwargs:
        sglang: {}
        vllm:
          gdn_prefill_backend: triton
      expert_parallel_size: 1
      free_cache_engine: true
      gpu_memory_utilization: 0.6
      ignore_eos: false
      layered_summon: true
      load_format: safetensors
      log_prob_max_token_len_per_gpu: 32768
      log_prob_micro_batch_size: null
      log_prob_micro_batch_size_per_gpu: null
      log_prob_use_dynamic_bsz: ${oc.select:recipes.training_config.actor_rollout_ref.actor.use_dynamic_bsz,true}
      logprobs_mode: processed_logprobs
      max_model_len: 32768
      max_num_batched_tokens: 8192
      max_num_seqs: 1024
      merge_lora_for_inference: true
      mode: async
      multi_stage_wake_up: false
      multi_turn:
        _target_: verl.workers.config.MultiTurnConfig
        enable: false
        format: hermes
        interaction_config_path: null
        max_assistant_turns: null
        max_parallel_calls: 1
        max_tool_response_length: 256
        max_user_turns: null
        num_repeat_rollouts: null
        tokenization_sanity_check_mode: strict
        tool_config_path: null
        tool_response_truncate_side: middle
        use_inference_chat_template: false
      'n': 8
      name: vllm
      over_sample_rate: 0
      pipeline_model_parallel_size: 1
      profiler:
        _target_: verl.utils.profiler.ProfilerConfig
        all_ranks: ${oc.select:recipes.training_config.actor_rollout_ref.actor.profiler.all_ranks,false}
        enable: ${oc.select:recipes.training_config.actor_rollout_ref.actor.profiler.enable,false}
        ranks: ${oc.select:recipes.training_config.actor_rollout_ref.actor.profiler.ranks,[]}
        save_path: ${oc.select:recipes.training_config.global_profiler.save_path,null}
        tool: ${oc.select:recipes.training_config.global_profiler.tool,null}
        tool_config: ${oc.select:recipes.training_config.actor_rollout_ref.actor.profiler.tool_config,null}
      prometheus:
        _target_: verl.workers.config.PrometheusConfig
        enable: false
        file: /tmp/ray/session_latest/metrics/prometheus/prometheus.yml
        port: 9090
        served_model_name: Qwen/Qwen3.5-27B
      prompt_length: 16384
      quantization: null
      quantization_config_file: null
      response_length: 16384
      skip_dump_dir: /tmp/rollout_dump
      skip_rollout: false
      skip_tokenizer_init: true
      temperature: 1.0
      tensor_model_parallel_size: 4
      top_k: -1
      top_p: 1
      trace:

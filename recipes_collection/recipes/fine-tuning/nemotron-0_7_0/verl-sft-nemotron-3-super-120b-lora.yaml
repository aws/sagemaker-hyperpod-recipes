display_name: Nemo3 Super 120B SFT LoRA Fine-Tuning
instance_types:
- ml.p5.48xlarge
run:
  model_type: verl
  name: verl-sft-nemo3-super-120b-lora
  results_dir: ${base_results_dir}/${.name}
trainer:
  devices: 8
  num_nodes: 4
training_config:
  checkpoint:
    _target_: verl.trainer.config.CheckpointConfig
    load_contents:
    - model
    - optimizer
    - extra
    - hf_model
    save_contents:
    - model
    - optimizer
    - extra
    - hf_model
    save_only_adapter_if_lora: true
  data:
    custom_cls:
      name: null
      path: null
    ignore_input_ids_mismatch: false
    max_length: 8192
    max_token_len_per_gpu: 16384
    messages_key: messages
    micro_batch_size_per_gpu: 1
    pad_mode: no_padding
    train_batch_size: 128
    train_files: null
    train_max_samples: -1
    train_val_split_ratio: 1.0
    truncation: left
    use_dynamic_bsz: true
    val_files: null
    val_max_samples: -1
  engine:
    _target_: verl.workers.config.McoreEngineConfig
    context_parallel_size: 1
    dist_checkpointing_path: null
    dist_checkpointing_prefix: ''
    dtype: bfloat16
    expert_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    forward_only: false
    grad_offload: false
    optimizer_offload: false
    override_ddp_config: {}
    override_mcore_model_config: {}
    override_transformer_config:
      apply_rope_fusion: true
      attention_backend: flash
      moe_latent_size: 1024
      moe_router_dtype: fp32
      moe_shared_expert_overlap: false
      mtp_num_layers: 0
      recompute_granularity: full
      recompute_method: uniform
      recompute_modules:
      - core_attn
      recompute_num_layers: 1
    param_offload: false
    pipeline_model_parallel_size: 4
    seed: 42
    sequence_parallel: true
    tensor_model_parallel_size: 8
    use_dist_checkpointing: false
    use_distributed_optimizer: true
    use_mbridge: true
    use_remove_padding: true
    vanilla_mbridge: false
    virtual_pipeline_model_parallel_size: null
  mlflow:
    run_id: ''
    tracking_uri: ''
  model:
    _target_: verl.workers.config.HFModelConfig
    custom_chat_template: null
    enable_activation_offload: false
    enable_gradient_checkpointing: true
    exclude_modules: null
    external_lib: verl.models.mcore.nemotron_h_patch
    fused_kernel_options:
      impl_backend: torch
    hf_config_path: null
    lora:
      alpha: 256
      rank: 128
      target_modules:
      - linear_qkv
      - linear_proj
      - linear_fc1
      - linear_fc2
      - in_proj
      - out_proj
    lora_adapter_path: null
    lora_alpha: 16
    lora_rank: 0
    override_config: {}
    path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
    target_modules: all-linear
    tiled_mlp:
      enabled: false
      num_shards: 4
    tokenizer_path: null
    trust_remote_code: true
    use_fused_kernels: false
    use_liger: false
    use_remove_padding: true
    use_shm: false
  optim:
    _target_: verl.workers.config.McoreOptimizerConfig
    betas:
    - 0.9
    - 0.95
    clip_grad: 1.0
    lr: 0.0001
    lr_decay_steps: null
    lr_decay_style: cosine
    lr_warmup_init: 0.0
    lr_warmup_steps: 10
    lr_warmup_steps_ratio: 0.0
    lr_wsd_decay_steps: null
    lr_wsd_decay_style: exponential
    min_lr: 1.0e-06
    optimizer: adam
    override_optimizer_config:
      use_precision_aware_optimizer: true
    total_training_steps: -1
    use_checkpoint_opt_param_scheduler: false
    weight_decay: 0.1
    weight_decay_incr_style: constant
  profiler:
    _target_: verl.utils.profiler.ProfilerConfig
    all_ranks: false
    enable: false
    ranks: []
    save_path: outputs/profile
    tool: torch
    tool_config:
      npu:
        _target_: verl.utils.profiler.config.NPUToolConfig
        analysis: true
        contents: []
        discrete: false
        level: level0
        name: npu
      nsys:
        _target_: verl.utils.profiler.config.NsightToolConfig
        discrete: ${oc.select:recipes.training_config.global_profiler.global_tool_config.nsys.discrete}
        name: nsight
      torch:
        _target_: verl.utils.profiler.config.TorchProfilerToolConfig
        manual_save: true
        name: torch
        step_end: null
        step_start: 0
      torch_memory:
        _target_: verl.utils.profiler.config.TorchMemoryToolConfig
        name: torch_memory
        stack_depth: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.stack_depth,32}
        trace_alloc_max_entries: ${oc.select:recipes.training_config.global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
  trainer:
    default_hdfs_dir: null
    default_local_dir: /opt/ml/model
    device: cuda
    experiment_name: nemo3_super_120b_sft_megatron_lora
    logger:
    - console
    - mlflow
    - tensorboard
    max_ckpt_to_keep: null
    merge_lora_on_final_save: true
    n_gpus_per_node: 8
    nnodes: 1
    profile_interval:
    - -1
    - -1
    project_name: verl_sft_nemo3_super
    resume_from_path: null
    resume_mode: auto
    save_freq: after_each_epoch
    test_freq: -1
    total_epochs: 1
    total_training_steps: null
  trainer_callbacks:
  - _target_: metering_callback.MeteringCallback
    output_path: /opt/ml/metering
version: 2.0.0

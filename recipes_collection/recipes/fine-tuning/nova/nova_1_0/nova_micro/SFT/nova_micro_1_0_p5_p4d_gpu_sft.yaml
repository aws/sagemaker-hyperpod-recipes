run:
  data_s3_path: ''
  mlflow_experiment_name: my-fullrank-experiment
  mlflow_run_name: my-fullrank-run
  mlflow_tracking_uri: ''
  model_name_or_path: nova-micro/prod
  model_type: amazon.nova-micro-v1:0:128k
  name: my-fullrank-run
  output_s3_path: ''
  replicas: 2
training_config:
  global_batch_size: 16
  max_length: 32768
  model:
    attention_dropout: 0.0
    ffn_dropout: 0.0
    hidden_dropout: 0.0
    optim:
      adam_w_mode: true
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-06
      lr: 5.0e-06
      name: distributed_fused_adam
      sched:
        constant_steps: 0
        min_lr: 5.0e-07
        warmup_steps: 10
      weight_decay: 0.0
    peft:
      peft_scheme: null
  trainer:
    max_epochs: 1

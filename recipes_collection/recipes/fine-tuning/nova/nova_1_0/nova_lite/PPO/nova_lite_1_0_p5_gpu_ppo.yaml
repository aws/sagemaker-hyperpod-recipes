ppo_actor_generation:
  actor_model_max_length: 8192
  trainer:
    num_nodes: ${recipes.run.actor_generation_replicas}
ppo_actor_train:
  actor_model_max_length: 8192
  max_length: 8192
  max_steps: 640
  model:
    attention_dropout: 0.0
    clip_ratio: 0.2
    ent_coeff: 0
    ffn_dropout: 0.0
    global_batch_size: 160
    hidden_dropout: 0.0
    kl_loss_coeff: 0.0
    kl_loss_type: low_var_kl
    kl_reward_penalty_coeff: 0.0
    lam: 1
    optim:
      adam_w_mode: true
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-08
      lr: 3.0e-06
      name: distributed_fused_adam
      weight_decay: 0.0
  reward_model_max_length: 8192
  trainer:
    num_nodes: ${recipes.run.actor_train_replicas}
  trajectory_buffer_scale: 8
ppo_anchor:
  max_length: 8192
  model:
    global_batch_size: 40
  trainer:
    num_nodes: ${recipes.run.am_replicas}
ppo_critic:
  max_length: 8192
  model:
    global_batch_size: 32
    optim:
      adam_w_mode: true
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-06
      lr: 3.0e-06
      name: distributed_fused_adam
      weight_decay: 0.0
  trainer:
    num_nodes: ${recipes.run.cm_replicas}
ppo_reward:
  max_length: 8192
  model:
    global_batch_size: 40
  trainer:
    num_nodes: ${recipes.run.rm_replicas}
run:
  actor_generation_replicas: 2
  actor_train_replicas: 2
  am_replicas: 1
  cm_replicas: 1
  data_s3_path: ''
  mlflow_experiment_name: my-ppo-experiment
  mlflow_run_name: my-ppo-run
  mlflow_tracking_uri: ''
  model_name_or_path: nova-lite/prod
  model_type: amazon.nova-lite-v1:0:300k
  name: my-ppo-run
  output_s3_path: ''
  rm_replicas: 1

run:
  data_s3_path: ''
  mlflow_experiment_name: my-fullrank-experiment
  mlflow_run_name: my-fullrank-run
  mlflow_tracking_uri: ''
  model_name_or_path: nova-lite/prod
  model_type: amazon.nova-lite-v1:0:300k
  name: my-fullrank-run
  output_s3_path: ''
  replicas: 4
training_config:
  global_batch_size: 64
  max_length: 16384
  model:
    attention_dropout: 0.0
    dpo_cfg:
      beta: 0.1
    ffn_dropout: 0.0
    hidden_dropout: 0.0
    optim:
      adam_w_mode: true
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-08
      lr: 1.0e-05
      name: distributed_fused_adam
      sched:
        constant_steps: 0
        min_lr: 1.0e-06
        warmup_steps: 10
      weight_decay: 0.01
    peft:
      peft_scheme: null
  trainer:
    max_epochs: 3

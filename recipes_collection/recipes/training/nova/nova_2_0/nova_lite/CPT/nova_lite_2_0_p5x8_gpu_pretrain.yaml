run:
  data_s3_path: ''
  mlflow_experiment_name: my-cpt-experiment
  mlflow_run_name: my-cpt-run
  mlflow_tracking_uri: ''
  model_name_or_path: nova-lite-2/prod
  model_type: amazon.nova-2-lite-v1:0:256k
  name: my-cpt-run
  output_s3_path: ''
  replicas: 8
  validation_data_s3_path: ''
training_config:
  global_batch_size: 256
  max_length: 8192
  model:
    attention_dropout: 0.0
    hidden_dropout: 0.0
  optim:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_w_mode: true
    eps: 1.0e-06
    lr: 1.0e-05
    name: distributed_fused_adam
    optimizer: adam
    sched:
      constant_steps: 0
      min_lr: 1.0e-06
      warmup_steps: 10
    weight_decay: 0.0
  task_type: cpt
  trainer:
    limit_val_batches: 2
    max_steps: 10
    val_check_interval: 10

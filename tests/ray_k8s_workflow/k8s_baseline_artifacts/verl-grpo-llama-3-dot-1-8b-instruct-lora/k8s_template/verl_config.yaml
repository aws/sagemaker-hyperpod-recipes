actor_rollout_ref:
  actor:
    _target_: verl.workers.config.FSDPActorConfig
    checkpoint:
      _target_: verl.trainer.config.CheckpointConfig
      async_save: false
      load_contents:
      - model
      - optimizer
      - extra
      save_contents:
      - model
      - optimizer
      - extra
    clip_ratio: 0.2
    clip_ratio_c: 3.0
    clip_ratio_high: 0.2
    clip_ratio_low: 0.2
    entropy_advantage: false
    entropy_advantage_alpha: 0.4
    entropy_advantage_kappa: 2
    entropy_checkpointing: false
    entropy_coeff: 0
    entropy_from_logits_with_chunking: false
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      forward_prefetch: false
      fsdp_size: -1
      model_dtype: bfloat16
      offload_policy: false
      optimizer_offload: false
      param_offload: false
      reshard_after_forward: true
      wrap_policy:
        min_num_params: 0
    grad_clip: 1.0
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    loss_agg_mode: token-mean
    optim:
      _target_: verl.workers.config.FSDPOptimizerConfig
      lr: '{{learning_rate}}'
      lr_warmup_steps: -1
      lr_warmup_steps_ratio: 0.0
      min_lr_ratio: 0.0
      num_cycles: 0.5
      total_training_steps: -1
      warmup_style: constant
      weight_decay: 0.01
    policy_loss:
      _target_: verl.workers.config.PolicyLossConfig
      clip_cov_lb: 1.0
      clip_cov_ratio: 0.0002
      clip_cov_ub: 5.0
      kl_cov_ratio: 0.0002
      loss_mode: vanilla
      ppo_kl_coef: 0.1
    ppo_epochs: 1
    ppo_max_token_len_per_gpu: 24576
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: 2
    ppo_mini_batch_size: 32
    shuffle: false
    strategy: fsdp2
    ulysses_sequence_parallel_size: 1
    use_dynamic_bsz: true
    use_fused_kernels: false
    use_kl_loss: true
    use_remove_padding: true
    use_torch_compile: true
  hybrid_engine: true
  model:
    attn_implementation: null
    custom_chat_template: null
    enable_activation_offload: false
    enable_gradient_checkpointing: true
    exclude_modules: null
    external_lib: null
    fused_kernel_options:
      impl_backend: torch
    is_saving_checkpoint_in_lora: true
    lora_alpha: 64
    lora_rank: 32
    override_config: {}
    path: '{{model_name_or_path}}'
    target_modules: all-linear
    trust_remote_code: false
    use_fused_kernels: false
    use_liger: false
    use_remove_padding: true
    use_shm: false
  profiler:
    _target_: verl.utils.profiler.ProfilerConfig
    all_ranks: false
    discrete: false
    ranks: []
  ref:
    entropy_checkpointing: false
    entropy_from_logits_with_chunking: false
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      forward_prefetch: false
      model_dtype: bfloat16
      param_offload: true
      reshard_after_forward: true
      wrap_policy:
        min_num_params: 0
    log_prob_max_token_len_per_gpu: 24576
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: 8
    log_prob_use_dynamic_bsz: true
    strategy: fsdp2
    ulysses_sequence_parallel_size: 1
    use_torch_compile: true
  rollout:
    agent:
      agent_loop_config_path: null
      custom_async_server:
        name: null
        path: null
      num_workers: 8
    calculate_log_probs: false
    disable_log_stats: true
    do_sample: true
    dtype: bfloat16
    enable_chunked_prefill: true
    enforce_eager: false
    engine_kwargs:
      sglang:
        attention_backend: null
      vllm:
        disable_mm_preprocessor_cache: false
        swap_space: null
    free_cache_engine: true
    gpu_memory_utilization: 0.6
    ignore_eos: false
    layered_summon: false
    load_format: safetensors
    log_prob_max_token_len_per_gpu: 24576
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: 8
    log_prob_use_dynamic_bsz: true
    max_model_len: null
    max_num_batched_tokens: 8192
    max_num_seqs: 1024
    merge_lora_for_inference: false
    mode: sync
    multi_stage_wake_up: false
    multi_turn:
      enable: false
      format: hermes
      interaction_config_path: null
      max_assistant_turns: null
      max_parallel_calls: 1
      max_tool_response_length: 256
      max_user_turns: null
      tokenization_sanity_check_mode: strict
      tool_config_path: null
      tool_response_truncate_side: middle
      use_inference_chat_template: false
    'n': 8
    name: vllm
    prompt_length: '{{max_prompt_length}}'
    response_length: 1024
    temperature: 1.0
    tensor_model_parallel_size: 2
    top_k: -1
    top_p: 1
    trace:
      backend: mlflow
      token2text: false
    update_weights_bucket_megabytes: 512
    val_kwargs:
      do_sample: false
      'n': 1
      temperature: 0
      top_k: -1
      top_p: 1.0
algorithm:
  _target_: verl.trainer.config.AlgoConfig
  adv_estimator: grpo
  gamma: 1.0
  kl_ctrl:
    _target_: verl.trainer.config.KLControlConfig
    horizon: 10000
    kl_coef: 0.001
    target_kl: 0.1
    type: fixed
  kl_penalty: kl
  lam: 1.0
  norm_adv_by_std_in_grpo: true
  pf_ppo:
    reweight_method: pow
    weight_pow: 2.0
  use_kl_in_reward: false
  use_pf_ppo: false
critic:
  _target_: verl.workers.config.FSDPCriticConfig
  checkpoint:
    _target_: verl.trainer.config.CheckpointConfig
    async_save: false
    load_contents:
    - model
    - optimizer
    - extra
    save_contents:
    - model
    - optimizer
    - extra
  cliprange_value: 0.5
  enable: null
  forward_max_token_len_per_gpu: 32768
  forward_micro_batch_size: null
  forward_micro_batch_size_per_gpu: null
  grad_clip: 1.0
  loss_agg_mode: token-mean
  model:
    _target_: verl.workers.config.FSDPCriticModelCfg
    enable_activation_offload: false
    enable_gradient_checkpointing: true
    external_lib: null
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      forward_prefetch: false
      fsdp_size: -1
      offload_policy: false
      optimizer_offload: false
      param_offload: true
      reshard_after_forward: true
      wrap_policy:
        min_num_params: 0
    lora_alpha: 16
    lora_rank: 0
    override_config: {}
    path: deepseek-ai/deepseek-llm-7b-chat
    target_modules: all-linear
    tokenizer_path: meta-llama/Llama-3.1-8B-Instruct
    trust_remote_code: false
    use_remove_padding: false
    use_shm: false
  optim:
    _target_: verl.workers.config.FSDPOptimizerConfig
    lr: 1.0e-05
    lr_warmup_steps: -1
    lr_warmup_steps_ratio: 0.0
    min_lr_ratio: null
    total_training_steps: -1
    warmup_style: constant
    weight_decay: 0.01
  ppo_epochs: 1
  ppo_max_token_len_per_gpu: 24576
  ppo_micro_batch_size: null
  ppo_micro_batch_size_per_gpu: null
  ppo_mini_batch_size: 256
  profiler:
    _target_: verl.utils.profiler.ProfilerConfig
    all_ranks: false
    discrete: false
    ranks: []
  rollout_n: 5
  shuffle: false
  strategy: fsdp
  ulysses_sequence_parallel_size: 1
  use_dynamic_bsz: true

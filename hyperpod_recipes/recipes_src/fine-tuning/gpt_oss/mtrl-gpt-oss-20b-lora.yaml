display_name: Agentic RFT for GPT OSS 20B Lora
recipe_version: "1.0.24"

run:
  name: mtrl-gpt-oss-20b-lora
  model_type: mtrl

batch:
  training_batch_size: 128            # prompts per training step
  group_size: 8                       # rollouts per prompt for training (GRPO)
  val_batch_size: null                # val examples per step (null = entire dataset)
  val_group_size: 1                   # rollouts per prompt for val (typically 1 for greedy)
  val_random_sample: false            # if true, randomly sample each val; if false, use fixed subset
rl:
  advantage_method: "group_based"     # group_based or monte_carlo
  advantage_normalization: true
  gamma: 1.0                          # discount factor for rewards
  loss_fn: "ppo"                      # importance_sampling, ppo, cispo
  clip_low_threshold: 0.8             # lower clipping threshold for PPO/CISPO
  clip_high_threshold: 1.2            # upper clipping threshold for PPO/CISPO
sampling_params:
  temperature: 1.0
  top_p: 1.0
  max_tokens: 4096
eval_sampling_params:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 4096
val_metrics_config:
  pass_k_values:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
  success_threshold: 1.0
schedule:
  epochs: 1                           # number of passes through dataset
  max_steps: 100                      # max training steps (stops early if reached)
  save_every: 1                      # checkpoint save interval (steps)
  val_every: 10                       # validation interval (steps)
  val_at_start: true                  # run baseline validation before training
model:
  model_name: "openai/gpt-oss-20b"
  max_sequence_length: 65536
  lora_rank: 32
  lora_alpha: 64
  learning_rate: 1e-5
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1e-8
  weight_decay: 0.0
  grad_clip_norm: 1.0
rollout:
  max_concurrency: 96                 # max concurrent rollout processes in flight to generator
  timeout: 600.0                      # max seconds per collection attempt
  max_retries: 3                      # retry attempts for failed rollouts
  rollout_tps: 5                      # Target rollout invocations per second
async_config:
  max_steps_off_policy: 3

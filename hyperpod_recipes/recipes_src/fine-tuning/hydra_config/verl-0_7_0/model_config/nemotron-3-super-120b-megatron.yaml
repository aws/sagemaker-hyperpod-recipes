# @package recipes.training_config.actor_rollout_ref.model
# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Indentation level is respected for nested fields.

# Target class for this configuration
_target_: verl.workers.config.HFModelConfig

# Model path for NVIDIA Nemotron-3-Super-120B-A12B-BF16
path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16

# config to the huggingface config. In case it is not the same as path
hf_config_path: null

# path to the huggingface tokenizer. In case it is not the same as path
tokenizer_path: null

# whether to use shared memory for model loading
use_shm: false

# whether to trust remote code.
trust_remote_code: true

# custom chat template for the model
custom_chat_template: null

# whether to use external libs for the model (Nemotron-H patches for Megatron-Core and vLLM)
external_lib: verl.models.mcore.nemotron_h_patch,verl.models.vllm.nemotron_h_latent_moe_patch

# override hf config
override_config:
  model_config: {}
  moe_config:
    freeze_moe_router: false

# whether to enable gradient checkpointing. Only valid when we use hf model definition
enable_gradient_checkpointing: true

# whether to enable activation offload. Only valid when we use hf model definition
enable_activation_offload: false

# whether to use remove padding. Only valid when we use hf model definition
use_remove_padding: false

# Set to positive value to enable LoRA (e.g., 32)
lora_rank: 0

# LoRA scaling factor
lora_alpha: 16

# Target modules for LoRA adaptation
target_modules: all-linear

# Exclude modules from LoRA adaptation
exclude_modules: null

# Path to pre-trained LoRA adapter to load for continued training
lora_adapter_path: null

# Whether to save checkpoint in LoRA format
is_saving_checkpoint_in_lora: false

# Whether to patch full model
patch_full_model: false

# Path to patched model
patched_model_path: null

# whether to use liger. Only valid when we use hf model definition
use_liger: false

# whether to use fused kernels.
use_fused_kernels: false

# fused kernel options.
fused_kernel_options:
  # the implementation backend for fused kernels.
  impl_backend: torch

# TiledMLP configuration for memory-efficient MLP computation.
tiled_mlp:
  # whether to enable TiledMLP
  enabled: false
  # number of shards to split the input.
  num_shards: 4

# LoRA (Low-Rank Adaptation) configuration for parameter-efficient fine-tuning (Megatron-style)
lora:
  # LoRA type
  type: lora
  # LoRA rank
  rank: 128
  # LoRA alpha
  alpha: 256
  # Dropout rate
  dropout: 0.0
  # Dropout position
  dropout_position: pre
  # Target modules for Megatron-style LoRA (includes MoE in_proj/out_proj)
  target_modules:
    - linear_qkv
    - linear_proj
    - in_proj
    - out_proj
  # Exclude modules
  exclude_modules: []
  # Initialization methods
  lora_A_init_method: xavier
  lora_B_init_method: zero
  # Experimental A2A communication
  a2a_experimental: false
  # Parameter data type
  dtype: null
  # Path to pre-trained adapter
  adapter_path: null
  # Freeze flags for VLM
  freeze_vision_model: true
  freeze_vision_projection: true
  freeze_language_model: true

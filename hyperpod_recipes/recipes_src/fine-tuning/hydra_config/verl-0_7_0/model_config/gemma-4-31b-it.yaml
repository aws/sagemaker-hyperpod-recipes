# @package recipes
# Gemma 4 31B IT model configuration for verl-0.7.0
training_config:
  model:
    path: google/gemma-4-31B-it
    trust_remote_code: true
    use_liger: false
    use_fused_kernels: true
    target_modules: .*q_proj.*|.*k_proj.*|.*v_proj.*|.*o_proj.*|.*gate_proj.*|.*up_proj.*|.*down_proj.*
    exclude_modules: .*vision_tower.*|.*embed_vision.*|.*embed_audio.*|.*audio_tower.*|.*router.*|.*experts.*
    override_config:
      attn_implementation: flash_attention_2
    tiled_mlp:
      enabled: false
      num_shards: 4

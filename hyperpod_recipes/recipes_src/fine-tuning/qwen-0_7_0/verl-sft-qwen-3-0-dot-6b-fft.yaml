defaults:
  - /hydra_config/verl-0_7_0/sft/default
  - /hydra_config/verl-0_7_0/sft/data/default
  - /hydra_config/verl-0_7_0/model/hf_model
  - /hydra_config/verl-0_7_0/engine/fsdp
  - /hydra_config/verl-0_7_0/optim/fsdp
  - /hydra_config/verl-0_7_0/sft/trainer/default
  - /hydra_config/verl-0_7_0/profiler/profiler
  - /hydra_config/verl-0_7_0/sft/checkpoint/default
  - _self_

display_name: "Qwen 3 0.6B SFT Full Fine-Tuning"
version: 2.1.0
instance_types: ["ml.p5.48xlarge", "ml.p4de.24xlarge", "ml.p4d.24xlarge"]

run:
  name: verl-sft-qwen-3-0-dot-6b-fft

trainer:
  num_nodes: 1

training_config:
  data:
    train_batch_size: 64
    micro_batch_size_per_gpu: 8
    max_length: 4096
    max_token_len_per_gpu: 16384
    truncation: right
    ignore_input_ids_mismatch: true

  engine:
    strategy: fsdp2
    model_dtype: bf16
    forward_prefetch: true

  model:
    path: Qwen/Qwen3-0.6B
    trust_remote_code: false
    use_liger: true
    use_fused_kernels: false

  optim:
    lr: 2.0e-05
    weight_decay: 0.1
    betas: [0.9, 0.95]
    lr_scheduler_type: cosine

  trainer:
    project_name: verl_sft_qwen_3_0_dot_6b
    experiment_name: qwen_3_0_dot_6b_sft_fsdp_fft_tatqa
    total_epochs: 1
    max_ckpt_to_keep: 3
    resume_mode: resume_path

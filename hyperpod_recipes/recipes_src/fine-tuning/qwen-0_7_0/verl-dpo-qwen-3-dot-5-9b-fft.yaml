defaults:
  - /hydra_config/verl-0_7_0/sft/default
  - /hydra_config/verl-0_7_0/dpo/data/default
  - /hydra_config/verl-0_7_0/model/hf_model
  - /hydra_config/verl-0_7_0/engine/fsdp
  - /hydra_config/verl-0_7_0/optim/fsdp
  - /hydra_config/verl-0_7_0/sft/trainer/default
  - /hydra_config/verl-0_7_0/dpo/trainer/default
  - /hydra_config/verl-0_7_0/profiler/profiler
  - /hydra_config/verl-0_7_0/sft/checkpoint/default
  - /hydra_config/verl-0_7_0/model_config/qwen-3-dot-5-9b
  - _self_

display_name: "Qwen 3.5 9B DPO Full Fine-Tuning"
version: 2.0.2
instance_types: ["ml.p5.48xlarge"]

run:
  name: verl-dpo-qwen-3-dot-5-9b-fft

trainer:
  num_nodes: 1

training_config:
  data:
    train_batch_size: 32
    max_length: 4096
    max_token_len_per_gpu: 16384

  engine:
    use_torch_compile: true
    model_dtype: bf16
    strategy: fsdp2

  optim:
    lr: 5.0e-5
    weight_decay: 0.0
    lr_warmup_steps_ratio: 0.1
    min_lr_ratio: 0.1
    lr_scheduler_type: cosine

  trainer:
    beta: 0.01
    loss_type: sigmoid
    total_epochs: 3
    save_freq: after_each_epoch
    test_freq: 5

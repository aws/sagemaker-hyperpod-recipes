defaults:
  - /hydra_config/verl-0_7_0/sft/default
  - /hydra_config/verl-0_7_0/dpo/data/default
  - /hydra_config/verl-0_7_0/model/hf_model
  - /hydra_config/verl-0_7_0/engine/fsdp
  - /hydra_config/verl-0_7_0/optim/fsdp
  - /hydra_config/verl-0_7_0/sft/trainer/default
  - /hydra_config/verl-0_7_0/dpo/trainer/default
  - /hydra_config/verl-0_7_0/profiler/profiler
  - /hydra_config/verl-0_7_0/sft/checkpoint/default
  - /hydra_config/verl-0_7_0/sft/peft/lora
  - /hydra_config/verl-0_7_0/model_config/gemma-4-31b-it
  - _self_

display_name: "Gemma 4 31B IT DPO LoRA Fine-Tuning"
version: 2.0.0
instance_types: ["ml.p5.48xlarge", "ml.p4de.24xlarge"]

run:
  name: verl-dpo-gemma-4-31b-it-lora

trainer:
  num_nodes: 1

training_config:
  data:
    train_batch_size: 128
    max_length: 16384
    max_token_len_per_gpu: 33280
    truncation: left
    micro_batch_size_per_gpu: 1
    apply_chat_template_kwargs:
      enable_thinking: false

  model:
    lora_rank: 64
    lora_alpha: 128
    lora_dropout: 0.05

  engine:
    use_torch_compile: true
    model_dtype: bfloat16
    strategy: fsdp2
    dtype: bfloat16

  optim:
    lr: 5.0e-5
    weight_decay: 0.01
    lr_warmup_steps: 10
    lr_warmup_steps_ratio: 0.0
    min_lr_ratio: 0.0
    lr_scheduler_type: constant

  trainer:
    beta: 0.01
    loss_type: sigmoid
    total_epochs: 3
    save_freq: after_each_epoch
    test_freq: 5

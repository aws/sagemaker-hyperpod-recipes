defaults:
  - /hydra_config/verl-0_7_0/sft/default
  - /hydra_config/verl-0_7_0/sft/data/default
  - /hydra_config/verl-0_7_0/model/hf_model
  - /hydra_config/verl-0_7_0/engine/fsdp
  - /hydra_config/verl-0_7_0/optim/fsdp
  - /hydra_config/verl-0_7_0/sft/trainer/default
  - /hydra_config/verl-0_7_0/profiler/profiler
  - /hydra_config/verl-0_7_0/sft/checkpoint/default
  - /hydra_config/verl-0_7_0/sft/peft/lora
  - _self_

display_name: "Gemma 4 31B IT SFT LoRA Fine-Tuning (Text)"
version: 2.0.1
instance_types: ["ml.p5.48xlarge"]

run:
  name: verl-sft-gemma-4-31b-it-lora

trainer:
  num_nodes: 1

training_config:
  data:
    train_batch_size: 128
    micro_batch_size_per_gpu: 1
    max_length: 32768
    max_token_len_per_gpu: 33280
    truncation: left
    use_dynamic_bsz: true
    apply_chat_template_kwargs:
      enable_thinking: false

  model:
    path: google/gemma-4-31B-it
    trust_remote_code: true
    enable_gradient_checkpointing: true
    use_remove_padding: true
    use_liger: false
    use_fused_kernels: true
    override_config:
      attn_implementation: flash_attention_2
    lora_rank: 64
    lora_alpha: 128
    target_modules: .*q_proj.*|.*k_proj.*|.*v_proj.*|.*o_proj.*|.*gate_proj.*|.*up_proj.*|.*down_proj.*
    exclude_modules: .*vision_tower.*|.*embed_vision.*|.*embed_audio.*|.*audio_tower.*|.*router.*|.*experts.*
    tiled_mlp:
      enabled: false
      num_shards: 4

  engine:
    strategy: fsdp2
    model_dtype: bfloat16
    dtype: bfloat16

  optim:
    lr: 5.0e-05
    weight_decay: 0.01
    betas: [0.9, 0.999]
    lr_scheduler_type: constant
    lr_warmup_steps: 10

  trainer:
    project_name: gemma4-sft
    experiment_name: gemma-4-31b-it-sft-lora
    total_epochs: 3
    test_freq: 5
    resume_mode: auto

  trainer_callbacks:
    - _target_: metering_callback.MeteringCallback
      output_path: /opt/ml/metering
